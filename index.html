<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TruckLog PRO – Restore</title>
  <meta name="theme-color" content="#081a33" />
  <style>
    :root{
      --bg:#060d18;
      --card:rgba(12,23,40,.92);
      --line:rgba(148,163,184,.14);
      --txt:#f7fbff;
      --muted:#a9b7d1;
      --muted2:#7f91af;
      --acc:#fb923c;
      --acc2:#38bdf8;
      --ok:#34d399;
      --warn:#fbbf24;
      --danger:#fb7185;
      --shadow:0 26px 70px rgba(2,6,23,.42);
      --max:1180px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;color:var(--txt);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 8% 6%, rgba(56,189,248,.16), transparent 24%),
        radial-gradient(circle at 92% 0%, rgba(251,146,60,.14), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(96,165,250,.12), transparent 28%),
        linear-gradient(180deg, #030712 0%, #07101d 38%, #091321 100%);
      overflow:hidden;display:flex;flex-direction:column;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer;border:0}
    input,select,textarea{
      width:100%;min-height:52px;border-radius:18px;padding:14px 16px;
      color:var(--txt);
      background:rgba(7,16,29,.86);
      border:1px solid rgba(148,163,184,.13);
      outline:none;
    }
    textarea{min-height:110px;resize:vertical}
    .hidden{display:none !important}
    .top-wrap,.app,.nav-in{max-width:var(--max);width:100%;margin:0 auto}
    .top-wrap{padding:12px 16px 0}
    .app{flex:1 1 auto;min-height:0;overflow-y:auto;padding:18px 16px 24px;-webkit-overflow-scrolling:touch}
    .screen{display:block}
    .hero,.section,.card,.block,.history-card,.banner{
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)),
        var(--card);
      border:1px solid rgba(148,163,184,.12);
      border-radius:24px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px) saturate(135%);
      -webkit-backdrop-filter:blur(18px) saturate(135%);
    }
    .hero,.section{padding:22px;margin-bottom:18px}
    .hero{position:relative;text-align:center}
    .hero-version{position:absolute;top:14px;right:14px;padding:8px 12px;border-radius:999px;background:rgba(7,14,26,.78);font-weight:900}
    .hero-accent{width:min(220px,55%);height:5px;border-radius:999px;background:linear-gradient(90deg,#38bdf8,#60a5fa,#fb923c);margin:12px auto}
    .title{font-size:clamp(1.2rem,2vw,1.8rem);font-weight:800;letter-spacing:-.04em}
    .desc,.muted,.hint{color:var(--muted)}
    .section-head,.actions,.history-top{display:flex;gap:16px;justify-content:space-between;align-items:flex-start;flex-wrap:wrap}
    .grid{display:grid;gap:14px}
    .split{display:grid;gap:16px;grid-template-columns:repeat(2,minmax(0,1fr))}
    .triple{display:grid;gap:14px;grid-template-columns:repeat(3,minmax(0,1fr))}
    .field{display:flex;flex-direction:column;gap:8px}
    .field label{font-size:.95rem;font-weight:700}
    .btn,.btn2,.btn-danger,.chip{
      min-height:50px;padding:0 16px;border-radius:18px;font-weight:800;
      transition:.18s transform,.18s background,.18s border-color,.18s box-shadow;
    }
    .btn{background:linear-gradient(135deg,#38bdf8,#fb923c);color:#05121f}
    .btn2,.chip{background:rgba(7,16,29,.9);border:1px solid rgba(148,163,184,.12);color:var(--txt)}
    .btn-danger{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);color:#ffd1da}
    .btn:hover,.btn2:hover,.btn-danger:hover,.chip:hover{transform:translateY(-1px)}
    .tabs,.profile-switcher{
      display:inline-flex;gap:6px;padding:7px;border-radius:20px;flex-wrap:wrap;
      background:rgba(5,12,24,.72);border:1px solid rgba(148,163,184,.1);
    }
    .tabs button,.profile-switcher button{
      background:transparent;color:#9db0cd;border-radius:15px;padding:10px 14px;min-height:42px;font-weight:800
    }
    .tabs button.active,.profile-switcher button.active{background:linear-gradient(135deg,#38bdf8,#fb923c);color:#04111f}
    .stats{display:grid;gap:12px;grid-template-columns:repeat(3,minmax(0,1fr))}
    .card{padding:16px}
    .tiny{font-size:.74rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted2);font-weight:700}
    .big{margin-top:6px;font-size:1.55rem;font-weight:900}
    .trip-switch{
      display:flex;align-items:center;justify-content:space-between;gap:14px;min-height:58px;padding:12px 14px;border-radius:20px;
      background:rgba(7,16,29,.9);border:1px solid rgba(148,163,184,.13);
    }
    .trip-switch-title{font-size:.84rem;font-weight:800}
    .trip-switch-control{position:relative;width:62px;height:36px;flex:0 0 auto}
    .trip-switch-control input{position:absolute;inset:0;width:100%;height:100%;margin:0;opacity:0;cursor:pointer;z-index:3}
    .trip-switch-slider{position:absolute;inset:0;border-radius:999px;background:rgba(56,189,248,.16);border:1px solid rgba(56,189,248,.18);transition:.22s}
    .trip-switch-slider::before{content:"";position:absolute;top:3px;left:3px;width:28px;height:28px;border-radius:50%;background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.24);transition:.22s transform}
    .trip-switch-control input:checked + .trip-switch-slider{background:linear-gradient(135deg,#38bdf8,#fb923c);border-color:rgba(255,255,255,.12)}
    .trip-switch-control input:checked + .trip-switch-slider::before{transform:translateX(26px)}
    .banner{padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .banner.warn{border-color:rgba(251,191,36,.28)}
    .banner.ok{border-color:rgba(52,211,153,.28)}
    .banner-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.12em;color:#7f91af;font-weight:800}
    .banner-status{margin-top:4px;font-size:.92rem;font-weight:700;line-height:1.35}
    .auth-inline-form{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .auth-inline-form input{width:220px;min-height:46px;border-radius:14px;padding:10px 12px}
    .chip-ok{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.22);color:#d1fae5;font-weight:800}
    .history-list,.list-gap{display:grid;gap:12px}
    .history-card{padding:16px}
    .vehicle-grid,.profile-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
    .nav{position:relative;z-index:30;background:rgba(4,10,20,.72);border-top:1px solid rgba(148,163,184,.1);backdrop-filter:blur(18px) saturate(150%);box-shadow:0 -16px 40px rgba(2,6,23,.3)}
    .nav-in{padding:10px 12px 2px;display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}
    .nav button{min-height:60px;border-radius:22px;background:transparent;color:#90a4c3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 6px}
    .nav button.active{background:rgba(12,24,42,.96);border:1px solid rgba(148,163,184,.12);color:#fff}
    .nav .i{font-size:1.06rem}
    .nav .t{font-size:.74rem;font-weight:800;text-align:center;line-height:1.05}
    .empty{padding:28px;border-radius:24px;border:1px dashed rgba(148,163,184,.18);background:rgba(5,12,24,.5);text-align:center;color:var(--muted)}
    .mt-16{margin-top:16px}
    @media (max-width:900px){
      .split,.triple,.stats{grid-template-columns:1fr}
      .nav-in{grid-template-columns:repeat(3,minmax(0,1fr))}
      .banner,.auth-inline-form{flex-direction:column;align-items:flex-start}
      .auth-inline-form input{width:100%}
    }
  </style>
</head>
<body>
  <div class="top-wrap">
    <div id="syncBanner" class="banner">
      <div>
        <div class="banner-title">Firebase vrstva</div>
        <div class="banner-status" id="syncStatus">Načítám…</div>
      </div>
      <div class="banner-status" id="syncNet">—</div>
    </div>

    <div id="authBanner" class="banner">
      <div>
        <div class="banner-title">Přihlášení</div>
        <div class="banner-status" id="authStatus">Načítám stav přihlášení…</div>
      </div>
      <div class="auth-inline-form" id="authControls"></div>
    </div>
  </div>

  <div class="app">
    <section id="screen-overview" class="screen">
      <section class="hero">
        <div class="hero-version">RESTORE</div>
        <h1>TruckLog</h1>
        <div class="hero-accent"></div>
        <p class="desc">obnovená funkční verze aplikace</p>
      </section>

      <section class="section">
        <div class="section-head">
          <div><h2 class="title">Profil</h2></div>
          <div class="profile-switcher" id="profileSwitcher"></div>
        </div>
        <div id="overviewStats"></div>
      </section>
    </section>

    <section id="screen-trip" class="screen hidden">
      <form id="tripForm">
        <section class="section">
          <div class="section-head"><div><h2 class="title" id="tripFormTitle">Nová jízda</h2></div></div>

          <div id="tripLivePanel"></div>

          <div class="split">
            <div class="block" style="padding:16px">
              <h3>Jízda</h3>
              <div class="grid mt-16">
                <div class="field">
                  <label for="tripDate">Datum</label>
                  <input id="tripDate" type="date" />
                </div>

                <div class="triple">
                  <div class="field">
                    <label for="tripDepartureTime">Čas odjezdu</label>
                    <input id="tripDepartureTime" type="time" />
                  </div>
                  <div class="field">
                    <label for="tripArrivalTime">Čas příjezdu</label>
                    <input id="tripArrivalTime" type="time" />
                  </div>
                  <div class="field">
                    <label for="tripEmptyDrive">Typ jízdy</label>
                    <label class="trip-switch" for="tripEmptyDrive">
                      <span class="trip-switch-title">Jízda po prázdnu</span>
                      <span class="trip-switch-control">
                        <input id="tripEmptyDrive" type="checkbox" />
                        <span class="trip-switch-slider"></span>
                      </span>
                    </label>
                  </div>
                </div>

                <div class="triple">
                  <div class="field">
                    <label for="tripKmStart">Km start</label>
                    <input id="tripKmStart" inputmode="numeric" />
                  </div>
                  <div class="field">
                    <label for="tripKmEnd">Km konec</label>
                    <input id="tripKmEnd" inputmode="numeric" />
                  </div>
                  <div class="field">
                    <label for="tripDistancePreview">Ujeto km</label>
                    <input id="tripDistancePreview" disabled placeholder="Počítá se automaticky" />
                  </div>
                </div>

                <div class="field">
                  <label for="tripFromPlace">Odkud firma / místo</label>
                  <input id="tripFromPlace" list="placesList" placeholder="Začni psát název místa..." />
                </div>
                <div class="field">
                  <label for="tripFromAddress">Odkud adresa</label>
                  <input id="tripFromAddress" placeholder="Adresa místa odkud" />
                </div>
                <div class="field">
                  <label for="tripToPlace">Kam firma / místo</label>
                  <input id="tripToPlace" list="placesList" placeholder="Začni psát název místa..." />
                </div>
                <div class="field">
                  <label for="tripToAddress">Kam adresa</label>
                  <input id="tripToAddress" placeholder="Adresa místa kam" />
                </div>

                <div class="field">
                  <label for="tripTrailerSelect">Přípojné vozidlo</label>
                  <select id="tripTrailerSelect"></select>
                </div>
                <datalist id="placesList"></datalist>
              </div>
            </div>

            <div class="block" style="padding:16px">
              <h3>Náklad</h3>
              <div class="grid mt-16">
                <div class="field" id="tripCommodityField">
                  <label for="tripCommodityPreset">Komodita</label>
                  <select id="tripCommodityPreset">
                    <option value="">Vyber komoditu</option>
                    <option>Cement</option>
                    <option>Popílek</option>
                    <option>Granulát</option>
                    <option>Vápno</option>
                    <option>Moučka</option>
                    <option>Sádra</option>
                    <option>Písek</option>
                    <option>Kamenivo</option>
                    <option>Jiná</option>
                  </select>
                </div>

                <div class="field hidden" id="tripCommodityCustomWrap">
                  <label for="tripCommodityCustom">Jiná komodita</label>
                  <input id="tripCommodityCustom" placeholder="Jiná komodita" />
                </div>

                <div class="field" id="tripQuantityField">
                  <label for="tripQuantityKg">Naložené množství (kg)</label>
                  <input id="tripQuantityKg" inputmode="numeric" placeholder="Např. 25450" />
                </div>

                <div class="field">
                  <label for="tripNote">Poznámka</label>
                  <textarea id="tripNote" placeholder="Např. delší čekání, objížďka"></textarea>
                </div>
              </div>
            </div>
          </div>
        </section>

        <div class="actions">
          <button class="btn" type="submit" id="tripSubmitBtn">Uložit jízdu</button>
          <button class="btn2" type="button" onclick="resetTripForm()">Vyčistit formulář</button>
          <button class="btn2" type="button" onclick="startActiveTrip()">Začít jízdu</button>
          <button class="btn2" type="button" onclick="startActiveTrip(true)">Začít jízdu + GPS</button>
        </div>
      </form>
    </section>

    <section id="screen-fuel" class="screen hidden">
      <form id="fuelForm">
        <section class="section">
          <div class="section-head"><div><h2 class="title" id="fuelFormTitle">Tankování / nabíjení</h2></div></div>
          <div class="split">
            <div class="block" style="padding:16px">
              <div class="grid">
                <div class="field">
                  <label for="fuelType">Typ</label>
                  <select id="fuelType">
                    <option value="Nafta">Nafta</option>
                    <option value="AdBlue">AdBlue</option>
                    <option value="CNG">CNG</option>
                    <option value="LNG">LNG</option>
                    <option value="Nabíjení">Nabíjení</option>
                  </select>
                </div>
                <div class="field">
                  <label for="fuelDate">Datum</label>
                  <input id="fuelDate" type="date" />
                </div>
                <div class="field">
                  <label for="fuelOdometer">Stav km</label>
                  <input id="fuelOdometer" inputmode="numeric" />
                </div>
                <div class="field">
                  <label for="fuelQuantity" id="fuelQuantityLabel">Litry</label>
                  <input id="fuelQuantity" inputmode="decimal" />
                </div>
              </div>
            </div>
            <div class="block" style="padding:16px">
              <div class="grid">
                <div class="field">
                  <label for="fuelStation" id="fuelStationLabel">Pumpa / místo</label>
                  <input id="fuelStation" />
                </div>
                <div class="field hidden" id="fuelDurationWrap">
                  <label for="fuelDurationMinutes">Doba nabíjení (min)</label>
                  <input id="fuelDurationMinutes" inputmode="numeric" />
                </div>
                <div class="field">
                  <label for="fuelNote">Poznámka</label>
                  <textarea id="fuelNote"></textarea>
                </div>
              </div>
            </div>
          </div>
        </section>
        <div class="actions">
          <button class="btn" type="submit" id="fuelSubmitBtn">Uložit záznam</button>
          <button class="btn2" type="button" onclick="resetFuelForm()">Vyčistit formulář</button>
        </div>
      </form>
    </section>

    <section id="screen-tech" class="screen hidden">
      <section class="section">
        <div class="section-head"><div><h2 class="title">Vozidla</h2></div></div>
        <div id="vehiclesList"></div>
      </section>

      <section class="section">
        <form id="vehicleForm">
          <div class="section-head"><div><h2 class="title" id="vehicleBlockTitle">Nové vozidlo</h2></div></div>
          <div class="split">
            <div class="block" style="padding:16px">
              <div class="grid">
                <div class="field">
                  <label for="vehicleType">Typ vozidla</label>
                  <select id="vehicleType">
                    <option value="Tahač">Tahač</option>
                    <option value="Silo cisterna">Silo cisterna</option>
                    <option value="Silo šasi">Silo šasi</option>
                    <option value="Kontejnerové šasi">Kontejnerové šasi</option>
                    <option value="Kontejnerový návěs">Kontejnerový návěs</option>
                    <option value="Frigo návěs">Frigo návěs</option>
                    <option value="Plachtový návěs">Plachtový návěs</option>
                    <option value="Skříňový návěs">Skříňový návěs</option>
                    <option value="Walking floor">Walking floor</option>
                    <option value="Sklápěcí návěs">Sklápěcí návěs</option>
                    <option value="Sklápěcí šasi">Sklápěcí šasi</option>
                    <option value="Valník / plato">Valník / plato</option>
                    <option value="Tandem / přívěs">Tandem / přívěs</option>
                    <option value="Jiné vozidlo">Jiné vozidlo</option>
                  </select>
                </div>

                <div class="field" id="vehicleBrandWrap">
                  <label for="vehicleBrand">Značka tahače</label>
                  <input id="vehicleBrand" placeholder="Např. MAN, VOLVO, SCANIA" />
                </div>

                <div class="field">
                  <label for="vehicleLabel">Označení</label>
                  <input id="vehicleLabel" placeholder="Např. Hlavní tahač, Silo 1..." />
                </div>
              </div>
            </div>

            <div class="block" style="padding:16px">
              <div class="grid">
                <div class="field">
                  <label for="vehiclePlate">SPZ</label>
                  <input id="vehiclePlate" placeholder="Např. 6AA4092" />
                </div>

                <div class="field">
                  <label for="vehicleStk">STK do</label>
                  <input id="vehicleStk" type="date" />
                </div>

                <div class="field">
                  <label for="vehicleNote">Poznámka</label>
                  <textarea id="vehicleNote"></textarea>
                </div>

                <div class="field">
                  <label class="trip-switch" for="vehiclePrimary">
                    <span class="trip-switch-title" id="vehiclePrimaryText">Použít jako hlavní v profilu</span>
                    <span class="trip-switch-control">
                      <input id="vehiclePrimary" type="checkbox" />
                      <span class="trip-switch-slider"></span>
                    </span>
                  </label>
                </div>
              </div>
            </div>
          </div>

          <div class="actions">
            <button class="btn" type="submit" id="vehicleSubmitBtn">Uložit vozidlo</button>
            <button class="btn2" type="button" onclick="resetVehicleForm()">Zrušit</button>
          </div>
        </form>
      </section>
    </section>

    <section id="screen-profiles" class="screen hidden">
      <section class="section">
        <div class="section-head">
          <div><h2 class="title">Profily</h2><p class="desc">Správa řidičů</p></div>
        </div>
        <div class="profile-switcher" id="profilesQuickSwitch"></div>
        <div id="profilesSummary" class="mt-16"></div>
      </section>

      <section class="section">
        <form id="profileForm">
          <div class="section-head"><div><h2 class="title" id="profileFormTitle">Nový profil</h2></div></div>
          <div class="split">
            <div class="block" style="padding:16px">
              <div class="field">
                <label for="profileDriverName">Jméno řidiče</label>
                <input id="profileDriverName" />
              </div>
            </div>
            <div class="block" style="padding:16px">
              <div class="field">
                <label for="profileNote">Poznámka</label>
                <textarea id="profileNote"></textarea>
              </div>
            </div>
          </div>
          <div class="actions">
            <button class="btn" type="submit" id="profileSubmitBtn">Uložit profil</button>
            <button class="btn2" type="button" onclick="resetProfileForm()">Zrušit editaci</button>
          </div>
        </form>
      </section>

      <section class="section">
        <div class="section-head"><div><h2 class="title">Seznam profilů</h2></div></div>
        <div id="profilesList"></div>
      </section>

      <section class="section">
        <div class="section-head"><div><h2 class="title">Záloha a export</h2></div></div>
        <div class="actions">
          <button class="btn" type="button" onclick="downloadBackup()">Stáhnout zálohu</button>
          <button class="btn2" type="button" onclick="promptRestoreBackup()">Obnovit ze souboru</button>
          <button class="btn2" type="button" onclick="exportTripsCsv()">Export jízd CSV</button>
          <button class="btn2" type="button" onclick="exportFuelingsCsv()">Export tankování CSV</button>
        </div>
        <input id="backupRestoreInput" type="file" accept=".json,application/json" class="hidden" />
      </section>
    </section>

    <section id="screen-history" class="screen hidden">
      <section class="section">
        <div class="history-top">
          <div><h2 class="title">Historie</h2></div>
          <div class="tabs">
            <button id="historyTripsBtn" class="active" type="button" onclick="setHistoryMode('trips')">Jízdy</button>
            <button id="historyFuelBtn" type="button" onclick="setHistoryMode('fuel')">Tankování</button>
          </div>
        </div>

        <div class="triple mt-16">
          <div class="field">
            <label for="historySearch">Hledat</label>
            <input id="historySearch" type="search" placeholder="Trasa, profil, komodita..." />
          </div>
          <div class="field">
            <label for="historyProfileFilter">Profil</label>
            <select id="historyProfileFilter"></select>
          </div>
          <div class="field">
            <label for="historyCommodityFilter">Komodita</label>
            <select id="historyCommodityFilter">
              <option value="">Vše</option>
              <option>Cement</option>
              <option>Popílek</option>
              <option>Granulát</option>
              <option>Vápno</option>
              <option>Moučka</option>
              <option>Sádra</option>
              <option>Písek</option>
              <option>Kamenivo</option>
            </select>
          </div>
        </div>
      </section>
      <div id="historyList"></div>
    </section>
  </div>

  <nav class="nav">
    <div class="nav-in">
      <button id="nav-overview" class="active" type="button" onclick="openScreen('overview')"><span class="i">🧭</span><span class="t">Přehled</span></button>
      <button id="nav-trip" type="button" onclick="openScreen('trip')"><span class="i">📝</span><span class="t">Jízda</span></button>
      <button id="nav-fuel" type="button" onclick="openScreen('fuel')"><span class="i">⛽</span><span class="t">Tankování</span></button>
      <button id="nav-tech" type="button" onclick="openScreen('tech')"><span class="i">🚚</span><span class="t">Vozidla</span></button>
      <button id="nav-profiles" type="button" onclick="openScreen('profiles')"><span class="i">👤</span><span class="t">Profily</span></button>
      <button id="nav-history" type="button" onclick="openScreen('history')"><span class="i">📁</span><span class="t">Historie</span></button>
    </div>
  </nav>

  <script>
    const STORAGE = {
      profiles: 'trucklog_profiles_restore',
      activeProfileId: 'trucklog_active_profile_id_restore',
      trips: 'trucklog_trips_restore',
      fuelings: 'trucklog_fuelings_restore',
      places: 'trucklog_places_restore',
      activeTrip: 'trucklog_active_trip_restore'
    };

    const COMMODITIES = ['Cement','Popílek','Granulát','Vápno','Moučka','Sádra','Písek','Kamenivo'];
    const VEHICLE_TYPES = ['Tahač','Silo cisterna','Silo šasi','Kontejnerové šasi','Kontejnerový návěs','Frigo návěs','Plachtový návěs','Skříňový návěs','Walking floor','Sklápěcí návěs','Sklápěcí šasi','Valník / plato','Tandem / přívěs','Jiné vozidlo'];

    const ENERGY_TYPE_CONFIG = {
      'Nafta': { unit:'l', quantityLabel:'Litry', stationLabel:'Pumpa / místo' },
      'AdBlue': { unit:'l', quantityLabel:'Litry AdBlue', stationLabel:'Pumpa / místo' },
      'CNG': { unit:'kg', quantityLabel:'Množství CNG (kg)', stationLabel:'Stanice / místo' },
      'LNG': { unit:'kg', quantityLabel:'Množství LNG (kg)', stationLabel:'Stanice / místo' },
      'Nabíjení': { unit:'kWh', quantityLabel:'Nabitá energie (kWh)', stationLabel:'Nabíječka / místo' }
    };

    const DEFAULT_PLACES = [
      { name:'Karl Schmidt SpeditionsgesmbH', address:'Industrie Strasse 7, 2431 Enzersdorf an der Fischa, Rakousko' },
      { name:'Borealis Polyolefine GmbH', address:'Danubiastraße 21/25, 2320 Schwechat, Rakousko' },
      { name:'NKT s.r.o.', address:'U Tržiště 685/1, 594 01 Velké Meziříčí, Česká republika' }
    ];

    function qs(id){ return document.getElementById(id); }
    function qsa(sel){ return Array.from(document.querySelectorAll(sel)); }
    function trim(v){ return String(v ?? '').trim(); }
    function digitsOnly(v){ return String(v || '').replace(/\D/g, ''); }
    function decimalOnly(v){ return String(v || '').replace(/[^\d,.]/g, '').replace(',', '.'); }
    function normalizeText(v){ return String(v ?? '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
    function esc(v){ return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'", '&#039;'); }
    function generateId(prefix){ return prefix + '-' + Date.now() + '-' + Math.floor(Math.random()*100000); }
    function today(){
      const now = new Date();
      const offset = now.getTimezoneOffset() * 60000;
      return new Date(now.getTime() - offset).toISOString().slice(0,10);
    }
    function formatDate(value){
      if(!value) return '—';
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? value : new Intl.DateTimeFormat('cs-CZ').format(d);
    }
    function readStorage(key, fallback){
      try{
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      }catch(error){
        console.error(error);
        return fallback;
      }
    }
    function csvEscape(value){
      const text = String(value ?? '');
      return /[";\n\r]/.test(text) ? '"' + text.replaceAll('"', '""') + '"' : text;
    }
    function buildCsv(rows){
      return rows.map(row => row.map(csvEscape).join(';')).join('\r\n');
    }
    function downloadTextFile(filename, content, mimeType='text/plain;charset=utf-8'){
      const blob = new Blob([content], { type:mimeType });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    function exportFileName(prefix, extension){
      const now = new Date();
      const pad = v => String(v).padStart(2,'0');
      return 'trucklog-' + prefix + '-' + now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + '_' + pad(now.getHours()) + '-' + pad(now.getMinutes()) + '.' + extension;
    }
    function kmDiff(start,end){
      const s = Number(start || 0);
      const e = Number(end || 0);
      return e > s ? e - s : 0;
    }
    function minutesBetween(start,end){
      if(!start || !end) return null;
      const s = start.split(':').map(Number);
      const e = end.split(':').map(Number);
      if(s.some(Number.isNaN) || e.some(Number.isNaN)) return null;
      const diff = (e[0]*60 + e[1]) - (s[0]*60 + s[1]);
      return diff >= 0 ? diff : null;
    }
    function formatDuration(minutes){
      if(minutes === null || minutes === undefined) return '—';
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      if(h && m) return h + ' h ' + m + ' min';
      if(h) return h + ' h';
      return m + ' min';
    }
    function roundedCurrentTime(step = 5){
      const now = new Date();
      now.setSeconds(0,0);
      const rounded = Math.ceil(now.getMinutes() / step) * step;
      now.setMinutes(rounded);
      return String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    }
    function sortByCreated(a,b){
      return new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0);
    }
    function tripSortValue(item){
      const date = trim(item?.date);
      const time = trim(item?.departureTime) || '00:00';
      const stamp = new Date(date + 'T' + time + ':00').getTime();
      return Number.isNaN(stamp) ? 0 : stamp;
    }
    function sortTripsByCalendar(list){
      return list.slice().sort((a,b)=>{
        const diff = tripSortValue(b) - tripSortValue(a);
        if(diff !== 0) return diff;
        return new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0);
      });
    }

    const state = {
      screen:'overview',
      historyMode:'trips',
      editingProfileId:null,
      editingTripId:null,
      editingFuelId:null,
      editingVehicleId:null,
      profiles: readStorage(STORAGE.profiles, []),
      activeProfileId: localStorage.getItem(STORAGE.activeProfileId) || '',
      trips: readStorage(STORAGE.trips, []),
      fuelings: readStorage(STORAGE.fuelings, []),
      places: readStorage(STORAGE.places, []),
      activeTrip: readStorage(STORAGE.activeTrip, null),
      finishingActiveTrip:false
    };

    const gpsRuntime = { watchId:null };

    function normalizeVehicle(vehicle){
      const type = VEHICLE_TYPES.includes(trim(vehicle?.type)) ? trim(vehicle?.type) : 'Jiné vozidlo';
      return {
        id: vehicle?.id || generateId('VEH'),
        type,
        brand: type === 'Tahač' ? trim(vehicle?.brand) : '',
        label: trim(vehicle?.label),
        plate: trim(vehicle?.plate).toUpperCase(),
        stk: trim(vehicle?.stk),
        note: trim(vehicle?.note),
        primaryForProfile: !!vehicle?.primaryForProfile,
        createdAt: vehicle?.createdAt || new Date().toISOString()
      };
    }
    function vehicleGroup(vehicle){
      return trim(vehicle?.type) === 'Tahač' ? 'truck' : 'trailer';
    }
    function fixVehiclePrimaries(vehicles){
      const normalized = vehicles.map(normalizeVehicle);
      ['truck','trailer'].forEach(group => {
        let seen = false;
        normalized.forEach(vehicle => {
          if(vehicleGroup(vehicle) !== group) return;
          if(vehicle.primaryForProfile && !seen){
            seen = true;
            return;
          }
          if(vehicle.primaryForProfile && seen) vehicle.primaryForProfile = false;
        });
      });
      if(!normalized.some(v => vehicleGroup(v) === 'truck' && v.primaryForProfile)){
        const firstTruck = normalized.find(v => vehicleGroup(v) === 'truck');
        if(firstTruck) firstTruck.primaryForProfile = true;
      }
      return normalized;
    }
    function normalizeProfile(profile){
      return {
        id: profile?.id || generateId('PROFILE'),
        driverName: trim(profile?.driverName),
        note: trim(profile?.note),
        vehicles: fixVehiclePrimaries(Array.isArray(profile?.vehicles) ? profile.vehicles : []),
        createdAt: profile?.createdAt || new Date().toISOString(),
        updatedAt: profile?.updatedAt || new Date().toISOString()
      };
    }
    function normalizeTrip(item){
      return {
        id: item?.id || generateId('TRIP'),
        profileId: trim(item?.profileId),
        date: trim(item?.date),
        departureTime: trim(item?.departureTime),
        arrivalTime: trim(item?.arrivalTime),
        emptyDrive: !!item?.emptyDrive,
        kmStart: digitsOnly(item?.kmStart),
        kmEnd: digitsOnly(item?.kmEnd),
        fromPlace: trim(item?.fromPlace),
        fromAddress: trim(item?.fromAddress),
        toPlace: trim(item?.toPlace),
        toAddress: trim(item?.toAddress),
        commodity: trim(item?.commodity),
        quantityKg: digitsOnly(item?.quantityKg),
        trailerType: trim(item?.trailerType),
        trailerPlate: trim(item?.trailerPlate).toUpperCase(),
        note: trim(item?.note),
        createdAt: item?.createdAt || new Date().toISOString(),
        updatedAt: item?.updatedAt || item?.createdAt || new Date().toISOString()
      };
    }
    function normalizeFuel(item){
      const type = trim(item?.energyType || 'Nafta') || 'Nafta';
      return {
        id: item?.id || generateId('FUEL'),
        profileId: trim(item?.profileId),
        date: trim(item?.date),
        odometer: digitsOnly(item?.odometer),
        energyType: type,
        quantity: decimalOnly(item?.quantity),
        station: trim(item?.station),
        durationMinutes: digitsOnly(item?.durationMinutes),
        note: trim(item?.note),
        createdAt: item?.createdAt || new Date().toISOString(),
        updatedAt: item?.updatedAt || item?.createdAt || new Date().toISOString()
      };
    }
    function normalizePlace(place){
      return {
        id: place?.id || generateId('PLACE'),
        name: trim(place?.name),
        address: trim(place?.address),
        usageCount: Number(place?.usageCount || 0),
        lastUsed: place?.lastUsed || new Date().toISOString()
      };
    }

    function ensureDataShape(){
      state.profiles = state.profiles.map(normalizeProfile);
      state.trips = sortTripsByCalendar(state.trips.map(normalizeTrip));
      state.fuelings = state.fuelings.map(normalizeFuel).sort(sortByCreated);
      state.places = Array.isArray(state.places) ? state.places.map(normalizePlace) : [];
      DEFAULT_PLACES.forEach(place => upsertPlace(place.name, place.address, false));
      if(state.activeProfileId && !state.profiles.some(p => p.id === state.activeProfileId)) state.activeProfileId = '';
      if(!state.activeProfileId && state.profiles.length) state.activeProfileId = state.profiles[0].id;
      state.activeTrip = normalizeActiveTrip(state.activeTrip);
    }

    function saveState(){
      localStorage.setItem(STORAGE.profiles, JSON.stringify(state.profiles));
      localStorage.setItem(STORAGE.activeProfileId, state.activeProfileId || '');
      localStorage.setItem(STORAGE.trips, JSON.stringify(state.trips));
      localStorage.setItem(STORAGE.fuelings, JSON.stringify(state.fuelings));
      localStorage.setItem(STORAGE.places, JSON.stringify(state.places));
      localStorage.setItem(STORAGE.activeTrip, JSON.stringify(state.activeTrip));

      if(window.TruckLogCloud && typeof window.TruckLogCloud.scheduleSave === 'function'){
        try{ window.TruckLogCloud.scheduleSave(); }catch(error){ console.error(error); }
      }
    }

    function activeProfile(){
      return state.profiles.find(p => p.id === state.activeProfileId) || null;
    }
    function activeVehicles(profile = activeProfile()){
      return Array.isArray(profile?.vehicles) ? fixVehiclePrimaries(profile.vehicles) : [];
    }
    function primaryTruckVehicle(profile){ return activeVehicles(profile).find(v => vehicleGroup(v) === 'truck' && v.primaryForProfile) || activeVehicles(profile).find(v => vehicleGroup(v) === 'truck') || null; }
    function primaryTrailerVehicle(profile){ return activeVehicles(profile).find(v => vehicleGroup(v) === 'trailer' && v.primaryForProfile) || null; }
    function primaryTruckPlate(profile){ return primaryTruckVehicle(profile)?.plate || ''; }
    function primaryTrailerPlate(profile){ return primaryTrailerVehicle(profile)?.plate || ''; }
    function profileLabel(profile){
      if(!profile) return 'Bez profilu';
      return [profile.driverName, primaryTruckPlate(profile)].filter(Boolean).join(' • ') || 'Profil';
    }
    function currentOdometer(profileId = state.activeProfileId){
      const tripMax = state.trips.filter(t => t.profileId === profileId).reduce((m, t) => Math.max(m, Number(t.kmEnd || 0)), 0);
      const fuelMax = state.fuelings.filter(f => f.profileId === profileId).reduce((m, f) => Math.max(m, Number(f.odometer || 0)), 0);
      return Math.max(tripMax, fuelMax);
    }

    function findPlace(name){
      const n = normalizeText(name);
      return state.places.find(place => normalizeText(place.name) === n) || null;
    }
    function upsertPlace(name, address, countUsage = true){
      const cleanName = trim(name);
      const cleanAddress = trim(address);
      if(!cleanName || !cleanAddress) return;
      const existing = findPlace(cleanName);
      if(existing){
        existing.address = cleanAddress;
        if(countUsage) existing.usageCount = (existing.usageCount || 0) + 1;
        existing.lastUsed = new Date().toISOString();
      }else{
        state.places.unshift({
          id: generateId('PLACE'),
          name: cleanName,
          address: cleanAddress,
          usageCount: countUsage ? 1 : 0,
          lastUsed: new Date().toISOString()
        });
      }
      state.places.sort((a,b)=>(b.usageCount || 0) - (a.usageCount || 0) || new Date(b.lastUsed || 0) - new Date(a.lastUsed || 0));
    }
    function renderPlacesDatalist(){
      qs('placesList').innerHTML = state.places.map(place => '<option value=\"' + esc(place.name) + '\"></option>').join('');
    }
    function autoFillPlaceAddress(placeInputId, addressInputId){
      const place = findPlace(qs(placeInputId).value);
      if(place) qs(addressInputId).value = place.address || '';
    }

    function gpsSupported(){ return typeof navigator !== 'undefined' && !!navigator.geolocation; }
    function activeTripGps(){
      return state.activeTrip?.gps || {
        enabled:false,tracking:false,status:'Vypnuto',distanceMeters:0,pointsCount:0,accuracyMeters:0,lastPoint:null,updatedAt:'',lastMessage:'',lastError:''
      };
    }
    function gpsDistanceKm(value = activeTripGps().distanceMeters){ return Number(value || 0) / 1000; }
    function gpsDistanceLabel(value = activeTripGps().distanceMeters){
      const km = gpsDistanceKm(value);
      if(km <= 0) return '0.0 km';
      return km.toFixed(km >= 10 ? 1 : 2) + ' km';
    }
    function gpsAccuracyLabel(value = activeTripGps().accuracyMeters){
      const a = Number(value || 0);
      return a > 0 ? '±' + Math.round(a) + ' m' : '—';
    }
    function gpsDistanceMetersBetween(a,b){
      if(!a || !b) return 0;
      const toRad = v => v * Math.PI / 180;
      const lat1 = Number(a.lat || 0), lon1 = Number(a.lon || 0);
      const lat2 = Number(b.lat || 0), lon2 = Number(b.lon || 0);
      const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
      const sinLat = Math.sin(dLat/2), sinLon = Math.sin(dLon/2);
      const h = sinLat*sinLat + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*sinLon*sinLon;
      return 6371000 * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1-h));
    }
    function normalizeActiveTrip(activeTrip){
      if(!activeTrip || typeof activeTrip !== 'object') return null;
      return {
        id: activeTrip?.id || generateId('ATRIP'),
        profileId: trim(activeTrip?.profileId),
        date: trim(activeTrip?.date) || today(),
        departureTime: trim(activeTrip?.departureTime) || roundedCurrentTime(5),
        kmStart: digitsOnly(activeTrip?.kmStart),
        fromPlace: trim(activeTrip?.fromPlace),
        fromAddress: trim(activeTrip?.fromAddress),
        toPlace: trim(activeTrip?.toPlace),
        toAddress: trim(activeTrip?.toAddress),
        emptyDrive: !!activeTrip?.emptyDrive,
        commodity: trim(activeTrip?.commodity),
        quantityKg: digitsOnly(activeTrip?.quantityKg),
        trailerType: trim(activeTrip?.trailerType),
        trailerPlate: trim(activeTrip?.trailerPlate).toUpperCase(),
        note: trim(activeTrip?.note),
        startedAt: activeTrip?.startedAt || new Date().toISOString(),
        gps: {
          enabled: !!activeTrip?.gps?.enabled,
          tracking:false,
          status: trim(activeTrip?.gps?.status) || 'Vypnuto',
          distanceMeters: Math.max(0, Number(activeTrip?.gps?.distanceMeters || 0)),
          pointsCount: Math.max(0, Number(activeTrip?.gps?.pointsCount || 0)),
          accuracyMeters: Math.max(0, Number(activeTrip?.gps?.accuracyMeters || 0)),
          lastPoint: activeTrip?.gps?.lastPoint || null,
          updatedAt: activeTrip?.gps?.updatedAt || '',
          lastMessage: trim(activeTrip?.gps?.lastMessage),
          lastError: trim(activeTrip?.gps?.lastError)
        }
      };
    }
    function activeTripDurationMinutes(){
      if(!state.activeTrip?.startedAt) return null;
      const started = new Date(state.activeTrip.startedAt).getTime();
      if(Number.isNaN(started)) return null;
      return Math.max(0, Math.floor((Date.now() - started) / 60000));
    }
    function activeTripRouteLabel(item = state.activeTrip){
      if(!item) return 'Trasa zatím není doplněná';
      const fromText = trim(item.fromPlace || item.fromAddress);
      const toText = trim(item.toPlace || item.toAddress);
      if(fromText && toText) return fromText + ' → ' + toText;
      if(fromText) return fromText + ' → …';
      if(toText) return '… → ' + toText;
      return 'Trasa zatím není doplněná';
    }
    function stopGpsAssistant(save = true){
      if(gpsRuntime.watchId !== null && gpsSupported()){
        navigator.geolocation.clearWatch(gpsRuntime.watchId);
      }
      gpsRuntime.watchId = null;
      if(state.activeTrip){
        state.activeTrip.gps.tracking = false;
        state.activeTrip.gps.status = state.activeTrip.gps.enabled ? 'Pozastaveno' : 'Vypnuto';
        if(save) saveState();
      }
    }
    function handleGpsPosition(position){
      if(!state.activeTrip) return stopGpsAssistant(false);
      const coords = position?.coords;
      if(!coords) return;
      const accuracy = Math.max(0, Number(coords.accuracy || 0));
      const point = { lat:Number(coords.latitude || 0), lon:Number(coords.longitude || 0), accuracy, timestamp:Number(position.timestamp || Date.now()) };
      const gps = activeTripGps();
      let nextDistance = Number(gps.distanceMeters || 0);
      let nextPoints = Number(gps.pointsCount || 0);
      let nextLastPoint = gps.lastPoint;
      let message = accuracy > 0 ? 'GPS ' + gpsAccuracyLabel(accuracy) : 'GPS bod přijat';
      let lastError = '';
      if(accuracy > 120){
        message = 'GPS signál je slabší ' + gpsAccuracyLabel(accuracy);
      }else if(!gps.lastPoint){
        nextLastPoint = point;
        nextPoints = 1;
        message = 'GPS start potvrzen ' + gpsAccuracyLabel(accuracy);
      }else{
        const deltaMeters = gpsDistanceMetersBetween(gps.lastPoint, point);
        const deltaSeconds = Math.max(1, (point.timestamp - Number(gps.lastPoint.timestamp || point.timestamp)) / 1000);
        const speed = deltaMeters / deltaSeconds;
        if(deltaMeters < 12){
          nextLastPoint = point.accuracy <= gps.lastPoint.accuracy ? point : gps.lastPoint;
          message = 'GPS běží • drobný posun ignorován';
        }else if(speed > 55){
          message = 'GPS skok ignorován';
          lastError = 'GPS zachytila nepřesný skok';
        }else{
          nextDistance += deltaMeters;
          nextPoints += 1;
          nextLastPoint = point;
          message = 'GPS sleduje trasu • ' + gpsDistanceLabel(nextDistance);
        }
      }
      state.activeTrip.gps = { ...gps, enabled:true, tracking:gpsRuntime.watchId !== null, status:'Sleduje trasu', distanceMeters:nextDistance, pointsCount:nextPoints, accuracyMeters:accuracy, lastPoint:nextLastPoint, updatedAt:new Date().toISOString(), lastMessage:message, lastError };
      saveState();
      if(state.screen === 'trip' || state.screen === 'overview') renderAll();
    }
    function handleGpsError(error){
      if(!state.activeTrip) return;
      const code = Number(error?.code || 0);
      let message = 'GPS asistent nemá dostupnou polohu';
      if(code === 1) message = 'Přístup k poloze byl zamítnut';
      if(code === 2) message = 'Poloha není momentálně dostupná';
      if(code === 3) message = 'GPS čeká na přesnější polohu';
      state.activeTrip.gps = { ...activeTripGps(), enabled:true, tracking:gpsRuntime.watchId !== null, status:'Čeká na polohu', updatedAt:new Date().toISOString(), lastError:message, lastMessage:message };
      saveState();
      if(state.screen === 'trip' || state.screen === 'overview') renderAll();
    }
    function startGpsAssistant(){
      if(!state.activeTrip){ alert('Nejdřív spusť aktivní jízdu.'); return; }
      if(!gpsSupported()){ alert('Toto zařízení nebo prohlížeč nepodporuje GPS polohu.'); return; }
      if(gpsRuntime.watchId !== null) return;
      state.activeTrip.gps = { ...activeTripGps(), enabled:true, tracking:true, status:'Čeká na polohu', updatedAt:new Date().toISOString(), lastMessage:'GPS se připojuje…', lastError:'' };
      saveState();
      renderAll();
      gpsRuntime.watchId = navigator.geolocation.watchPosition(handleGpsPosition, handleGpsError, { enableHighAccuracy:true, maximumAge:5000, timeout:15000 });
    }
    function applyGpsDistanceToTripForm(force = false){
      if(!state.activeTrip?.gps) return false;
      const kmStart = Number(digitsOnly(qs('tripKmStart')?.value || state.activeTrip.kmStart || 0));
      const gpsKm = Math.round(gpsDistanceKm());
      if(!kmStart || gpsKm <= 0) return false;
      const kmEndInput = qs('tripKmEnd');
      if(!kmEndInput) return false;
      if(!force && digitsOnly(kmEndInput.value)) return false;
      kmEndInput.value = String(kmStart + gpsKm);
      updateTripDistancePreview();
      return true;
    }

    function currentTripTrailerSnapshot(){
      const select = qs('tripTrailerSelect');
      const option = select?.selectedOptions?.[0];
      return { type: trim(option?.dataset?.type), plate: trim(option?.dataset?.plate).toUpperCase() };
    }
    function populateTripTrailerSelect(selectedType = '', selectedPlate = ''){
      const select = qs('tripTrailerSelect');
      if(!select) return;
      const trailers = activeVehicles(activeProfile()).filter(v => vehicleGroup(v) === 'trailer');
      const activeTrailer = primaryTrailerVehicle(activeProfile());
      const cleanType = trim(selectedType), cleanPlate = trim(selectedPlate).toUpperCase();
      let selectedValue = '';
      const options = ['<option value=\"\" data-type=\"\" data-plate=\"\">Bez přípojného vozidla</option>'];
      trailers.forEach(vehicle => {
        const vehiclePlate = trim(vehicle.plate).toUpperCase();
        const vehicleType = trim(vehicle.type);
        const isSelected = cleanPlate ? vehiclePlate === cleanPlate : (cleanType ? vehicleType === cleanType : (!!activeTrailer && vehicle.id === activeTrailer.id));
        if(isSelected) selectedValue = vehicle.id;
        options.push('<option value=\"' + esc(vehicle.id) + '\" data-type=\"' + esc(vehicleType) + '\" data-plate=\"' + esc(vehiclePlate) + '\">' + esc([vehicle.label || vehicle.type, vehicle.plate].filter(Boolean).join(' • ')) + '</option>');
      });
      select.innerHTML = options.join('');
      select.value = selectedValue;
    }
    function syncTripTrailerSelect(){

    function toggleCommodityCustom(){
      const isOther = qs('tripCommodityPreset').value === 'Jiná';
      qs('tripCommodityCustomWrap').classList.toggle('hidden', !isOther);
      if(!isOther) qs('tripCommodityCustom').value = '';
    }
    function toggleEmptyDrive(){
      const checked = qs('tripEmptyDrive').checked;
      qs('tripCommodityField').classList.toggle('hidden', checked);
      qs('tripCommodityCustomWrap').classList.add('hidden');
      qs('tripQuantityField').classList.toggle('hidden', checked);
      if(checked){
        qs('tripCommodityPreset').value = '';
        qs('tripCommodityCustom').value = '';
        qs('tripQuantityKg').value = '0';
      }else if(qs('tripQuantityKg').value === '0'){
        qs('tripQuantityKg').value = '';
      }
    }
    function selectedCommodity(){
      if(qs('tripEmptyDrive').checked) return '';
      return qs('tripCommodityPreset').value === 'Jiná' ? trim(qs('tripCommodityCustom').value) : trim(qs('tripCommodityPreset').value);
    }
    function setCommodityFields(value){
      const clean = trim(value);
      if(!clean){
        qs('tripCommodityPreset').value = '';
        qs('tripCommodityCustom').value = '';
        toggleCommodityCustom();
        return;
      }
      if(COMMODITIES.includes(clean)){
        qs('tripCommodityPreset').value = clean;
        qs('tripCommodityCustom').value = '';
      }else{
        qs('tripCommodityPreset').value = 'Jiná';
        qs('tripCommodityCustom').value = clean;
      }
      toggleCommodityCustom();
    }
    function updateTripDistancePreview(){

      if(force || !qs('tripDate').value) qs('tripDate').value = today();

      if(force || !digitsOnly(qs('tripKmStart').value)){

        qs('tripKmStart').value = odo > 0 ? String(odo) : '';

      updateTripDistancePreview();

        id: existing?.id || generateId('VEH'),

    function profileValid(profile){ return !!profile.driverName; }
    function tripValid(trip){ return !!(trip.profileId && trip.date && trip.kmStart && trip.kmEnd && (trip.fromPlace || trip.fromAddress) && (trip.toPlace || trip.toAddress)); }
    function fuelValid(fuel){ return !!(fuel.profileId && fuel.date && fuel.odometer && fuel.quantity); }
    function vehicleValid(vehicle){ return !!(vehicle.type && (vehicle.label || vehicle.plate || vehicle.stk)); }

    function renderProfileSwitchers(){
      const markup = state.profiles.length
        ? state.profiles.map(profile => '<button type=\"button\" class=\"' + (profile.id === state.activeProfileId ? 'active' : '') + '\" onclick=\"activateProfile(\\'' + esc(profile.id) + '\\')\">' + esc(profile.driverName || primaryTruckPlate(profile) || 'Profil') + '</button>').join('')
        : '<button type=\"button\" class=\"active\">Bez profilu</button>';
      qs('profileSwitcher').innerHTML = markup;
      qs('profilesQuickSwitch').innerHTML = markup;
    }

    function renderHistoryFilters(){
      const currentValue = qs('historyProfileFilter').value;
      qs('historyProfileFilter').innerHTML = '<option value=\"\">Všechny profily</option>' + state.profiles.map(profile => '<option value=\"' + esc(profile.id) + '\">' + esc(profileLabel(profile)) + '</option>').join('');
      qs('historyProfileFilter').value = state.profiles.some(profile => profile.id === currentValue) ? currentValue : '';
    }
    function filteredTrips(){
      const search = normalizeText(qs('historySearch').value);
      const profileId = trim(qs('historyProfileFilter').value);
      const commodity = trim(qs('historyCommodityFilter').value);
      return sortTripsByCalendar(state.trips.filter(item => {
        if(profileId && item.profileId !== profileId) return false;
        if(commodity && item.commodity !== commodity) return false;
        if(!search) return true;
        const profile = state.profiles.find(p => p.id === item.profileId);
        const haystack = [item.fromPlace,item.fromAddress,item.toPlace,item.toAddress,item.commodity,item.trailerType,item.trailerPlate,item.note,profileLabel(profile)].join(' ');
        return normalizeText(haystack).includes(search);
      }));
    }
    function filteredFuelings(){
      const search = normalizeText(qs('historySearch').value);
      const profileId = trim(qs('historyProfileFilter').value);
      return state.fuelings.filter(item => {
        if(profileId && item.profileId !== profileId) return false;
        if(!search) return true;
        const profile = state.profiles.find(p => p.id === item.profileId);
        const haystack = [item.energyType,item.station,item.note,profileLabel(profile),item.odometer,item.quantity].join(' ');
        return normalizeText(haystack).includes(search);
      }).slice().sort(sortByCreated);
    }
    function setHistoryMode(mode){
      state.historyMode = mode;
      qs('historyTripsBtn').classList.toggle('active', mode === 'trips');
      qs('historyFuelBtn').classList.toggle('active', mode === 'fuel');
      qs('historyCommodityFilter').disabled = mode !== 'trips';
      renderHistory();
    }

      renderHistoryFilters();

      if(state.historyMode === 'fuel'){
        const list = filteredFuelings();
        root.innerHTML = list.length
          ? '<div class=\"section\"><div class=\"history-list\">' + list.map(item => {
              const profile = state.profiles.find(p => p.id === item.profileId);

              return `
                <div class=\"history-card\">
                  <div class=\"tiny\">${esc(formatDate(item.date))} • ${esc(profileLabel(profile))}</div>
                  <div class=\"big\">${esc(item.station || config.stationLabel)}</div>
                  <div class=\"muted mt-16\">${esc(item.energyType)} • ${esc(item.quantity)} ${esc(config.unit)} • ${esc(item.odometer || '—')} km</div>
                  ${item.note ? '<div class=\"muted mt-16\">' + esc(item.note) + '</div>' : ''}
                  <div class=\"actions mt-16\">
                    <button class=\"btn2\" type=\"button\" onclick=\"editFuel('${esc(item.id)}')\">Upravit</button>
                    <button class=\"btn-danger\" type=\"button\" onclick=\"removeFuel('${esc(item.id)}')\">Smazat</button>
                  </div>
                </div>
              `;
            }).join('') + '</div></div>'
          : '<div class=\"empty\">Žádné tankování.</div>';
      }else{
        const list = filteredTrips();
        root.innerHTML = list.length
          ? '<div class=\"section\"><div class=\"history-list\">' + list.map(item => {
              const profile = state.profiles.find(p => p.id === item.profileId);
              return `
                <div class=\"history-card\">
                  <div class=\"tiny\">${esc(formatDate(item.date))} • ${esc(profileLabel(profile))}</div>
                  <div class=\"big\">${esc((item.fromPlace || item.fromAddress || '—') + ' → ' + (item.toPlace || item.toAddress || '—'))}</div>
                  <div class=\"muted mt-16\">${esc(item.departureTime || '—')} → ${esc(item.arrivalTime || '—')} • ${kmDiff(item.kmStart,item.kmEnd)} km • ${esc(item.trailerPlate || 'bez přípojného vozidla')}</div>
                  ${item.note ? '<div class=\"muted mt-16\">' + esc(item.note) + '</div>' : ''}
                  <div class=\"actions mt-16\">
                    <button class=\"btn2\" type=\"button\" onclick=\"copyTrip('${esc(item.id)}')\">Kopírovat</button>
                    <button class=\"btn2\" type=\"button\" onclick=\"editTrip('${esc(item.id)}')\">Upravit</button>
                    <button class=\"btn-danger\" type=\"button\" onclick=\"removeTrip('${esc(item.id)}')\">Smazat</button>
                  </div>
                </div>
              `;
            }).join('') + '</div></div>'
          : '<div class=\"empty\">Žádné jízdy.</div>';
      }
    }

    function openScreen(screen){
      state.screen = screen;
      qsa('.screen').forEach(el => el.classList.add('hidden'));
      qs('screen-' + screen).classList.remove('hidden');
      qsa('.nav button').forEach(btn => btn.classList.remove('active'));
      qs('nav-' + screen).classList.add('active');
      renderAll();
    }
    function activateProfile(id){ state.activeProfileId = id; saveState(); renderAll(); }

    function editProfile(id){
      const profile = state.profiles.find(item => item.id === id);
      if(!profile) return;
      state.editingProfileId = id;
      qs('profileDriverName').value = profile.driverName || '';
      qs('profileNote').value = profile.note || '';
      qs('profileFormTitle').textContent = 'Upravit profil';
      qs('profileSubmitBtn').textContent = 'Uložit změny';
      openScreen('profiles');
    }
    function removeProfile(id){
      if(!confirm('Opravdu smazat profil?')) return;
      state.trips = state.trips.filter(item => item.profileId !== id);
      state.fuelings = state.fuelings.filter(item => item.profileId !== id);
      state.profiles = state.profiles.filter(item => item.id !== id);
      if(state.activeTrip?.profileId === id){ state.activeTrip = null; state.finishingActiveTrip = false; }
      if(state.activeProfileId === id) state.activeProfileId = state.profiles[0]?.id || '';
      saveState(); renderAll();
    }

    function fillTripFormFromRecord(item, mode='edit'){
      if(!item) return;
      if(mode === 'copy'){
        state.activeProfileId = item.profileId || state.activeProfileId;
        state.editingTripId = null;
      }else{
        state.activeProfileId = item.profileId;
        state.editingTripId = item.id;
      }
      qs('tripDate').value = item.date || today();
      qs('tripDepartureTime').value = item.departureTime || '';
      qs('tripArrivalTime').value = item.arrivalTime || '';
      qs('tripEmptyDrive').checked = !!item.emptyDrive;
      qs('tripKmStart').value = item.kmStart || '';
      qs('tripKmEnd').value = mode === 'copy' ? '' : (item.kmEnd || '');
      qs('tripFromPlace').value = item.fromPlace || '';
      qs('tripFromAddress').value = item.fromAddress || '';
      qs('tripToPlace').value = item.toPlace || '';
      qs('tripToAddress').value = item.toAddress || '';
      setCommodityFields(item.commodity || '');
      qs('tripQuantityKg').value = item.quantityKg || '';
      qs('tripNote').value = mode === 'copy' ? '' : (item.note || '');
      qs('tripFormTitle').textContent = mode === 'copy' ? 'Kopie minulé jízdy' : 'Upravit jízdu';
      qs('tripSubmitBtn').textContent = mode === 'copy' ? 'Uložit jízdu' : 'Uložit změny';
      toggleEmptyDrive();
      populateTripTrailerSelect(item.trailerType, item.trailerPlate);
      updateTripDistancePreview();
      openScreen('trip');
    }
    function editTrip(id){ fillTripFormFromRecord(state.trips.find(trip => trip.id === id), 'edit'); }
    function copyTrip(id){ fillTripFormFromRecord(state.trips.find(trip => trip.id === id), 'copy'); }
    function removeTrip(id){
      if(!confirm('Opravdu smazat jízdu?')) return;
      state.trips = state.trips.filter(item => item.id !== id);
      saveState(); renderAll();
    }

    function editFuel(id){
      const item = state.fuelings.find(fuel => fuel.id === id);
      if(!item) return;
      state.editingFuelId = id;
      state.activeProfileId = item.profileId;
      qs('fuelType').value = item.energyType || 'Nafta';
      qs('fuelDate').value = item.date || today();
      qs('fuelOdometer').value = item.odometer || '';
      qs('fuelQuantity').value = item.quantity || '';
      qs('fuelDurationMinutes').value = item.durationMinutes || '';
      qs('fuelStation').value = item.station || '';
      qs('fuelNote').value = item.note || '';
      updateFuelFormFields();
      qs('fuelFormTitle').textContent = 'Upravit tankování / nabíjení';
      qs('fuelSubmitBtn').textContent = 'Uložit změny';
      openScreen('fuel');
    }
    function removeFuel(id){
      if(!confirm('Opravdu smazat záznam?')) return;
      state.fuelings = state.fuelings.filter(item => item.id !== id);
      saveState(); renderAll();
    }

    function editVehicle(id){
      const vehicle = activeVehicles(activeProfile()).find(item => item.id === id);
      if(!vehicle) return;
      state.editingVehicleId = id;
      qs('vehicleType').value = vehicle.type || 'Tahač';

      qs('vehiclePlate').value = vehicle.plate || '';
      qs('vehicleStk').value = vehicle.stk || '';
