      openScreen('tech');
    }
    function removeVehicle(id){
      const profile = activeProfile();
      if(!profile) return;
      if(!confirm('Opravdu smazat vozidlo?')) return;
      state.profiles = state.profiles.map(item => {
        if(item.id !== profile.id) return item;
        const filtered = activeVehicles(item).filter(vehicle => vehicle.id !== id);
        return { ...item, vehicles: fixVehiclePrimaries(filtered), updatedAt:new Date().toISOString() };
      });
      saveState(); renderAll();
    }

    function activeTripSnapshotFromForm(){
      const trailerSnapshot = currentTripTrailerSnapshot();
      return normalizeActiveTrip({
        id: generateId('ATRIP'),
        profileId: state.activeProfileId,
        date: qs('tripDate').value || today(),
        departureTime: trim(qs('tripDepartureTime').value) || roundedCurrentTime(5),
        kmStart: digitsOnly(qs('tripKmStart').value),
        fromPlace: trim(qs('tripFromPlace').value),
        fromAddress: trim(qs('tripFromAddress').value),
        toPlace: trim(qs('tripToPlace').value),
        toAddress: trim(qs('tripToAddress').value),
        emptyDrive: !!qs('tripEmptyDrive').checked,
        commodity: selectedCommodity(),
        quantityKg: qs('tripEmptyDrive').checked ? '0' : digitsOnly(qs('tripQuantityKg').value),
        trailerType: trailerSnapshot.type,
        trailerPlate: trailerSnapshot.plate,
        note: trim(qs('tripNote').value),
        startedAt: new Date().toISOString(),
        gps: { enabled:false, tracking:false, status:'Vypnuto', distanceMeters:0, pointsCount:0, accuracyMeters:0, lastPoint:null, updatedAt:'', lastMessage:'', lastError:'' }
      });
    }
    function startActiveTrip(useGps = false){
      if(!state.activeProfileId){ alert('Nejdřív si vytvoř a aktivuj profil.'); openScreen('profiles'); return; }
      if(state.activeTrip){ alert('Jedna aktivní jízda už běží.'); return; }
      fillTripSmartStart(false);
      const snapshot = activeTripSnapshotFromForm();
      if(!snapshot?.kmStart){ alert('Pro zahájení jízdy vyplň km start.'); qs('tripKmStart')?.focus(); return; }
      state.activeTrip = normalizeActiveTrip({ ...snapshot, gps:{ ...snapshot.gps, enabled: !!useGps, status: useGps ? 'Čeká na polohu' : 'Vypnuto', lastMessage: useGps ? 'GPS se připojuje…' : '' } });
      state.finishingActiveTrip = false;
      saveState(); renderAll();
      if(useGps) startGpsAssistant();
    }
    function loadActiveTripIntoForm(){
      if(!state.activeTrip) return;
      stopGpsAssistant(false);
      const item = state.activeTrip;
      state.activeProfileId = item.profileId || state.activeProfileId;
      state.editingTripId = null;
      state.finishingActiveTrip = true;
      qs('tripDate').value = item.date || today();
      qs('tripDepartureTime').value = item.departureTime || roundedCurrentTime(5);
      qs('tripArrivalTime').value = roundedCurrentTime(5);
      qs('tripEmptyDrive').checked = !!item.emptyDrive;
      qs('tripKmStart').value = item.kmStart || '';
      qs('tripKmEnd').value = '';
      qs('tripFromPlace').value = item.fromPlace || '';
      qs('tripFromAddress').value = item.fromAddress || '';
      qs('tripToPlace').value = item.toPlace || '';
      qs('tripToAddress').value = item.toAddress || '';
      setCommodityFields(item.commodity || '');
      qs('tripQuantityKg').value = item.quantityKg || '';
      qs('tripNote').value = item.note || '';
      qs('tripFormTitle').textContent = 'Dokončit aktivní jízdu';
      qs('tripSubmitBtn').textContent = 'Uložit dokončenou jízdu';
      toggleEmptyDrive();
      populateTripTrailerSelect(item.trailerType, item.trailerPlate);
      applyGpsDistanceToTripForm(true);
      updateTripDistancePreview();
      openScreen('trip');
    }
    function cancelActiveTrip(){
      if(!state.activeTrip) return;
      if(!confirm('Opravdu zrušit aktivní jízdu?')) return;
      stopGpsAssistant(false);
      state.activeTrip = null;
      state.finishingActiveTrip = false;
      saveState(); renderAll();
    }

    function downloadBackup(){
      const payload = {
        schema:'trucklog-backup',
        appVersion:'restore',
        exportedAt:new Date().toISOString(),
        data:{
          activeProfileId: state.activeProfileId || '',
          profiles: state.profiles,
          trips: state.trips,
          fuelings: state.fuelings,
          places: state.places,
          activeTrip: state.activeTrip
        }
      };
      downloadTextFile('trucklog-backup.json', JSON.stringify(payload, null, 2), 'application/json;charset=utf-8');
    }
    function promptRestoreBackup(){
      qs('backupRestoreInput').value = '';
      qs('backupRestoreInput').click();
    }
    function handleBackupImport(event){
      const file = event.target.files && event.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(loadEvent){
        try{
          const parsed = JSON.parse(String(loadEvent.target?.result || '{}'));
          const data = parsed && parsed.data ? parsed.data : parsed;
          state.profiles = Array.isArray(data?.profiles) ? data.profiles : [];
          state.trips = Array.isArray(data?.trips) ? data.trips : [];
          state.fuelings = Array.isArray(data?.fuelings) ? data.fuelings : [];
          state.places = Array.isArray(data?.places) ? data.places : [];
          state.activeTrip = data?.activeTrip || null;
          state.activeProfileId = trim(data?.activeProfileId);
          ensureDataShape();
          saveState();
          resetProfileForm(); resetTripForm(); resetFuelForm(); resetVehicleForm();
          renderAll();
          alert('Záloha byla úspěšně obnovena.');
        }catch(error){
          console.error(error);
          alert('Soubor se nepodařilo obnovit.');
        }
      };
      reader.readAsText(file, 'utf-8');
    }
    function exportTripsCsv(){
      const rows = [['Datum','Čas odjezdu','Čas příjezdu','Profil','Řidič','Odkud','Kam','Km start','Km konec','Ujeto km','Komodita','Množství kg','Přípojné vozidlo','SPZ přípojného vozidla','Poznámka']];
      sortTripsByCalendar(state.trips).forEach(item => {
        const profile = state.profiles.find(p => p.id === item.profileId);
        rows.push([item.date || '', item.departureTime || '', item.arrivalTime || '', profileLabel(profile), profile?.driverName || '', item.fromPlace || item.fromAddress || '', item.toPlace || item.toAddress || '', item.kmStart || '', item.kmEnd || '', String(kmDiff(item.kmStart, item.kmEnd) || ''), item.emptyDrive ? 'Po prázdnu' : (item.commodity || ''), item.emptyDrive ? '0' : (item.quantityKg || ''), item.trailerType || '', item.trailerPlate || '', item.note || '']);
      });
      downloadTextFile(exportFileName('jizdy', 'csv'), buildCsv(rows), 'text/csv;charset=utf-8');
    }
    function exportFuelingsCsv(){
      const rows = [['Datum','Profil','Řidič','Typ','Množství','Stav km','Místo','Doba nabíjení min','Poznámka']];
      state.fuelings.slice().sort(sortByCreated).forEach(item => {
        const profile = state.profiles.find(p => p.id === item.profileId);
        rows.push([item.date || '', profileLabel(profile), profile?.driverName || '', item.energyType || 'Nafta', item.quantity || '', item.odometer || '', item.station || '', item.durationMinutes || '', item.note || '']);
      });
      downloadTextFile(exportFileName('tankovani', 'csv'), buildCsv(rows), 'text/csv;charset=utf-8');
    }

    function authControlsGuest(infoText='Použij účet, který jsi vytvořil ve Firebase Authentication.'){
      qs('authBanner').className = 'banner';
      qs('authStatus').textContent = infoText;
      qs('authControls').innerHTML = `
        <input id="authEmail" type="email" placeholder="E-mail" autocomplete="username" />
        <input id="authPassword" type="password" placeholder="Heslo" autocomplete="current-password" />
        <button id="loginBtn" class="btn" type="button">Přihlásit</button>
        <button id="registerBtn" class="btn2" type="button">Registrovat</button>
      `;
    }
    function authControlsUser(user, infoText='Firebase Authentication funguje správně.'){
      qs('authBanner').className = 'banner ok';
      qs('authStatus').textContent = 'Přihlášený uživatel: ' + (user?.email || 'bez e-mailu') + ' • ' + infoText;
      qs('authControls').innerHTML = `
        <span class="chip-ok">✅ Přihlášen</span>
        <button id="logoutBtn" class="btn2" type="button">Odhlásit</button>
      `;
    }

    qs('profileForm').addEventListener('submit', function(event){
      event.preventDefault();
      const profile = getProfileFormData();
      if(!profileValid(profile)){ alert('Vyplň prosím jméno řidiče.'); return; }
      const exists = state.profiles.some(item => item.id === profile.id);
      state.profiles = exists ? state.profiles.map(item => item.id === profile.id ? profile : item) : [profile, ...state.profiles];
      if(!state.activeProfileId || state.editingProfileId) state.activeProfileId = profile.id;
      saveState(); resetProfileForm(); renderAll();
    });

    qs('tripForm').addEventListener('submit', function(event){
      event.preventDefault();
      if(!state.activeProfileId){ alert('Nejdřív si vytvoř a aktivuj profil.'); openScreen('profiles'); return; }
      const trip = getTripFormData();
      if(!tripValid(trip)){ alert('Vyplň prosím datum, km start, km konec a odkud/kam.'); return; }
      if(Number(trip.kmEnd) < Number(trip.kmStart)){ alert('Km konec nemůže být menší než km start.'); return; }
      if(trip.fromPlace && trip.fromAddress) upsertPlace(trip.fromPlace, trip.fromAddress, true);
      if(trip.toPlace && trip.toAddress) upsertPlace(trip.toPlace, trip.toAddress, true);
      const exists = state.trips.some(item => item.id === trip.id);
      state.trips = exists ? state.trips.map(item => item.id === trip.id ? trip : item) : [trip, ...state.trips];
      state.trips = sortTripsByCalendar(state.trips);
      if(state.finishingActiveTrip && state.activeTrip && state.activeTrip.profileId === trip.profileId){
        stopGpsAssistant(false);
        state.activeTrip = null;
        state.finishingActiveTrip = false;
      }
      saveState(); resetTripForm(); openScreen('history');
    });

    qs('fuelForm').addEventListener('submit', function(event){
      event.preventDefault();
      if(!state.activeProfileId){ alert('Nejdřív si vytvoř a aktivuj profil.'); openScreen('profiles'); return; }
      const fuel = getFuelFormData();
      if(!fuelValid(fuel)){ alert('Vyplň prosím datum, stav km a množství.'); return; }
      const exists = state.fuelings.some(item => item.id === fuel.id);
      state.fuelings = exists ? state.fuelings.map(item => item.id === fuel.id ? fuel : item) : [fuel, ...state.fuelings];
      state.fuelings.sort(sortByCreated);
      saveState(); resetFuelForm(); openScreen('history');
    });

    qs('vehicleForm').addEventListener('submit', function(event){
      event.preventDefault();
      const profile = activeProfile();
      if(!profile){ alert('Nejdřív si vytvoř a aktivuj profil.'); openScreen('profiles'); return; }
      const vehicle = getVehicleFormData();
      if(!vehicleValid(vehicle)){ alert('Vyplň prosím aspoň typ vozidla a některý z údajů označení, SPZ nebo STK.'); return; }
      state.profiles = state.profiles.map(item => {
        if(item.id !== profile.id) return item;
        let vehicles = activeVehicles(item);
        if(vehicle.primaryForProfile){
          vehicles = vehicles.map(v => vehicleGroup(v) === vehicleGroup(vehicle) ? { ...v, primaryForProfile:false } : v);
        }
        const exists = vehicles.some(v => v.id === vehicle.id);
        const merged = exists ? vehicles.map(v => v.id === vehicle.id ? vehicle : v) : [vehicle, ...vehicles];
        return { ...item, vehicles: fixVehiclePrimaries(merged), updatedAt:new Date().toISOString() };
      });
      saveState(); resetVehicleForm(); renderAll();
    });

    qs('tripCommodityPreset').addEventListener('change', toggleCommodityCustom);
    qs('tripEmptyDrive').addEventListener('change', toggleEmptyDrive);
    qs('tripKmStart').addEventListener('input', e => { e.target.value = digitsOnly(e.target.value); updateTripDistancePreview(); });
    qs('tripKmEnd').addEventListener('input', e => { e.target.value = digitsOnly(e.target.value); updateTripDistancePreview(); });
    qs('tripQuantityKg').addEventListener('input', e => { e.target.value = digitsOnly(e.target.value); });
    qs('tripFromPlace').addEventListener('change', () => autoFillPlaceAddress('tripFromPlace','tripFromAddress'));
    qs('tripToPlace').addEventListener('change', () => autoFillPlaceAddress('tripToPlace','tripToAddress'));

    qs('fuelOdometer').addEventListener('input', e => { e.target.value = digitsOnly(e.target.value); });
    qs('fuelQuantity').addEventListener('input', e => { e.target.value = decimalOnly(e.target.value); });
    qs('fuelDurationMinutes').addEventListener('input', e => { e.target.value = digitsOnly(e.target.value); });
    qs('fuelType').addEventListener('change', updateFuelFormFields);

    qs('vehiclePlate').addEventListener('input', e => { e.target.value = e.target.value.toUpperCase(); });
    qs('vehicleType').addEventListener('change', updateVehiclePrimaryLabel);

    qs('historySearch').addEventListener('input', renderHistory);
    qs('historyProfileFilter').addEventListener('change', renderHistory);
    qs('historyCommodityFilter').addEventListener('change', renderHistory);
    qs('backupRestoreInput').addEventListener('change', handleBackupImport);

    ensureDataShape();
    resetProfileForm();
    resetTripForm();
    resetFuelForm();
    resetVehicleForm();
    setHistoryMode('trips');
    renderAll();

    window.setInterval(() => {
      if(!state.activeTrip) return;
      renderActiveTripPanel();
      if(state.screen === 'overview') renderOverview();
    }, 30000);
  </script>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js';
    import {
      initializeFirestore,
      persistentLocalCache,
      persistentMultipleTabManager,
      doc,
      setDoc,
      getDoc
    } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signOut
    } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA3vdgHphyimE4916E-uIQrGx-IwAsmJws",
      authDomain: "trucklog-e8e69.firebaseapp.com",
      projectId: "trucklog-e8e69",
      storageBucket: "trucklog-e8e69.firebasestorage.app",
      messagingSenderId: "471621022674",
      appId: "1:471621022674:web:361f0fb5fbaf5e529b4e0b"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = initializeFirestore(firebaseApp, {
      localCache: persistentLocalCache({
        tabManager: persistentMultipleTabManager()
      })
    });
    const auth = getAuth(firebaseApp);

    const cloudState = {
      ready:true,
      online:navigator.onLine,
      level:'',
      message:'Firebase vrstva je připravená.'
    };
    const cloudSync = {
      loading:false,
      saveTimer:null
    };

    function setSync(message, level=''){
      cloudState.message = message;
      cloudState.level = level;
      const banner = document.getElementById('syncBanner');
      const status = document.getElementById('syncStatus');
      const net = document.getElementById('syncNet');
      if(banner) banner.className = 'banner' + (level ? ' ' + level : '');
      if(status) status.textContent = message;
      if(net) net.textContent = cloudState.online ? 'Online' : 'Offline';
    }

    function authErrorMessage(error){
      const code = error?.code || '';
      if(code.includes('invalid-email')) return 'Neplatný e-mail.';
      if(code.includes('missing-password')) return 'Zadej heslo.';
      if(code.includes('weak-password')) return 'Heslo je moc slabé. Použij alespoň 6 znaků.';
      if(code.includes('email-already-in-use')) return 'Tento e-mail už existuje.';
      if(code.includes('invalid-credential')) return 'Špatný e-mail nebo heslo.';
      if(code.includes('user-not-found')) return 'Uživatel neexistuje.';
      if(code.includes('wrong-password')) return 'Špatné heslo.';
      if(code.includes('too-many-requests')) return 'Příliš mnoho pokusů. Zkus to později.';
      return 'Došlo k chybě: ' + (error?.message || 'neznámá chyba');
    }

    function getAppBridge(){
      return window.TruckLogApp || null;
    }
    function buildCloudPayload(){
      const app = getAppBridge();
      const s = app?.state;
      return {
        activeProfileId: s?.activeProfileId || '',
        profiles: Array.isArray(s?.profiles) ? s.profiles : [],
        trips: Array.isArray(s?.trips) ? s.trips : [],
        fuelings: Array.isArray(s?.fuelings) ? s.fuelings : [],
        places: Array.isArray(s?.places) ? s.places : [],
        activeTrip: s?.activeTrip || null
      };
    }

    async function saveCloudStateNow(force = false){
      const user = auth.currentUser;
      const app = getAppBridge();
      if(!user || !app) return;
      if(cloudSync.loading && !force) return;

      clearTimeout(cloudSync.saveTimer);
      setSync('Ukládám data do Firestore...');
      try{
        const ref = doc(db, 'users', user.uid, 'meta', 'appState');
        await setDoc(ref, {
          updatedAt: new Date().toISOString(),
          updatedBy: user.email || '',
          data: buildCloudPayload()
        }, { merge:true });
        setSync('Cloud synchronizace běží. Data jsou uložená ve Firestore.');
      }catch(error){
        console.error(error);
        setSync('Chyba ukládání do Firestore: ' + (error?.message || error), 'warn');
      }
    }

    function scheduleCloudSave(delay = 800){
      if(!auth.currentUser || cloudSync.loading) return;
      clearTimeout(cloudSync.saveTimer);
      cloudSync.saveTimer = setTimeout(() => saveCloudStateNow(), delay);
    }

    async function loadCloudState(user){
      const app = getAppBridge();
      if(!user || !app) return;

      cloudSync.loading = true;
      setSync('Načítám data z Firestore...');
      try{
        const ref = doc(db, 'users', user.uid, 'meta', 'appState');
        const snap = await getDoc(ref);

        if(snap.exists() && snap.data()?.data){
          const remote = snap.data().data;
          const s = app.state;
          s.activeProfileId = String(remote.activeProfileId || '');
          s.profiles = Array.isArray(remote.profiles) ? remote.profiles : [];
          s.trips = Array.isArray(remote.trips) ? remote.trips : [];
          s.fuelings = Array.isArray(remote.fuelings) ? remote.fuelings : [];
          s.places = Array.isArray(remote.places) ? remote.places : [];
          s.activeTrip = remote.activeTrip || null;

          app.ensureDataShape();
          app.saveState();
          app.resetProfileForm();
          app.resetTripForm();
          app.resetFuelForm();
          app.resetVehicleForm();
          app.renderAll();

          setSync('Cloud data byla načtena z Firestore.');
        }else{
          await saveCloudStateNow(true);
          setSync('Firestore byl prázdný. Nahrál jsem do něj aktuální lokální data.');
        }
      }catch(error){
        console.error(error);
        setSync('Chyba načtení z Firestore: ' + (error?.message || error), 'warn');
      }finally{
        cloudSync.loading = false;
      }
    }

    window.TruckLogCloud = {
      app: firebaseApp,
      db,
      auth,
      ready:true,
      online:navigator.onLine,
      user:null,
      scheduleSave: scheduleCloudSave,
      saveNow: () => saveCloudStateNow(true),
      loadNow: () => auth.currentUser ? loadCloudState(auth.currentUser) : Promise.resolve()
    };

    window.addEventListener('online', () => {
      cloudState.online = true;
      window.TruckLogCloud.online = true;
      setSync('Zařízení je online. Firebase vrstva je připravená.');
    });
    window.addEventListener('offline', () => {
      cloudState.online = false;
      window.TruckLogCloud.online = false;
      setSync('Zařízení je offline. Lokální vrstva běží dál.', 'warn');
    });

    function bindGuestAuthButtons(){
      const loginBtn = document.getElementById('loginBtn');
      const registerBtn = document.getElementById('registerBtn');
      const emailInput = document.getElementById('authEmail');
      const passwordInput = document.getElementById('authPassword');

      async function loginNow(){
        const email = (emailInput?.value || '').trim();
        const password = passwordInput?.value || '';
        if(!email || !password){
          window.authControlsGuest?.('Vyplň e-mail i heslo.');
          bindGuestAuthButtons();
          return;
        }
        try{
          await signInWithEmailAndPassword(auth, email, password);
        }catch(error){
          window.authControlsGuest?.(authErrorMessage(error));
          bindGuestAuthButtons();
        }
      }

      async function registerNow(){
        const email = (emailInput?.value || '').trim();
        const password = passwordInput?.value || '';
        if(!email || !password){
          window.authControlsGuest?.('Vyplň e-mail i heslo.');
          bindGuestAuthButtons();
          return;
        }
        try{
          await createUserWithEmailAndPassword(auth, email, password);
        }catch(error){
          window.authControlsGuest?.(authErrorMessage(error));
          bindGuestAuthButtons();
        }
      }

      if(loginBtn) loginBtn.onclick = loginNow;
      if(registerBtn) registerBtn.onclick = registerNow;
      if(passwordInput){
        passwordInput.onkeydown = (event) => {
          if(event.key === 'Enter'){
            event.preventDefault();
            loginNow();
          }
        };
      }
    }

    onAuthStateChanged(auth, async (user) => {
      window.TruckLogCloud.user = user || null;

      if(user){
        window.authControlsUser?.(user, 'Firebase Authentication funguje správně.');
        const logoutBtn = document.getElementById('logoutBtn');
        if(logoutBtn){
          logoutBtn.onclick = async () => {
            try{
              await signOut(auth);
            }catch(error){
              console.error(error);
            }
          };
        }
        await loadCloudState(user);
      }else{
        window.authControlsGuest?.('Použij účet, který jsi vytvořil ve Firebase Authentication.');
        bindGuestAuthButtons();
        setSync('Nejsi přihlášený. Appka běží jen lokálně.', 'warn');
      }

      if(typeof window.renderAll === 'function'){
        try{ window.renderAll(); }catch(error){ console.error(error); }
      }
    });

    setSync('Firebase vrstva je připravená.');
  </script>
</body>
