<!DOCTYPE html>
<html lang="cs">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TruckLog PRO</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system;
margin:0;
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:18px;
font-size:22px;
text-align:center;
}

nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#1e293b;
}

nav button{
flex:1;
border:none;
background:none;
color:white;
font-size:22px;
padding:16px;
}

.screen{
display:none;
padding:15px;
padding-bottom:100px;
}

.active{
display:block;
}

.card{
background:#1e293b;
padding:18px;
margin-bottom:15px;
border-radius:16px;
}

input,select{

width:100%;
padding:14px;
margin-top:8px;
margin-bottom:12px;

border:none;
border-radius:10px;

background:#334155;
color:white;

font-size:16px;

}

button.action{

width:100%;
padding:16px;
border:none;

background:#3b82f6;

border-radius:14px;

font-size:18px;
color:white;

}

.statgrid{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;

}

.stat{

background:#1e293b;
padding:15px;
border-radius:12px;
text-align:center;

}

.big{

font-size:22px;
font-weight:bold;

}

</style>

</head>

<body>

<header>

🚛 TruckLog PRO

</header>

<!-- DASHBOARD -->

<div id="dashboard" class="screen active">

<div class="statgrid">

<div class="stat">
<div>Jízdy</div>
<div class="big" id="statDrives">0</div>
</div>

<div class="stat">
<div>Tankování</div>
<div class="big" id="statFuel">0</div>
</div>

<div class="stat">
<div>Myčky</div>
<div class="big" id="statWash">0</div>
</div>

<div class="stat">
<div>Spotřeba</div>
<div class="big" id="statCons">0</div>
</div>

</div>

</div>

<!-- JÍZDA -->

<div id="drive" class="screen">

<div class="card">

<h3>Nakládka</h3>

<input placeholder="Místo nakládky" id="loadPlace">

<input type="datetime-local" id="loadStart">

<input type="datetime-local" id="loadEnd">

<select id="material">

<option>Cement</option>
<option>Vápno</option>
<option>Popílek</option>

</select>

</div>

<div class="card">

<h3>Myčka cisterny</h3>

<input type="datetime-local" id="washStart">
<input type="datetime-local" id="washEnd">

</div>

<div class="card">

<h3>Vykládka</h3>

<input placeholder="Místo vykládky" id="unloadPlace">

<input type="datetime-local" id="unloadStart">

<input type="datetime-local" id="unloadEnd">

<input placeholder="Váha nákladu (t)" id="weight">

</div>

<div class="card">

<h3>Režim jízdy</h3>

<select id="mode">

<option>Dálnice</option>
<option>Okresky</option>
<option>Kombinace</option>

</select>

<input placeholder="Průměrný tlak bar" id="pressure">

</div>

<button class="action" onclick="saveDrive()">Uložit jízdu</button>

</div>

<!-- TANKOVÁNÍ -->

<div id="fuel" class="screen">

<div class="card">

<h3>Tankování</h3>

<input placeholder="Km stav" id="fuelKm">

<input placeholder="Litry" id="fuelLiters">

<button class="action" onclick="saveFuel()">Uložit</button>

</div>

</div>

<!-- SERVIS -->

<div id="service" class="screen">

<div class="card">

<h3>Servis</h3>

<input placeholder="Popis servisní práce" id="serviceText">

<input placeholder="Km" id="serviceKm">

<button class="action" onclick="saveService()">Uložit</button>

</div>

</div>

<!-- PNEU -->

<div id="tires" class="screen">

<div class="card">

<h3>Pneumatiky</h3>

<input placeholder="Pozice (např. Tahač přední)" id="tirePos">

<input placeholder="Km montáže" id="tireKm">

<button class="action" onclick="saveTire()">Uložit</button>

</div>

</div>

<!-- STATISTIKA -->

<div id="stats" class="screen">

<div class="card">

<canvas id="fuelChart"></canvas>

</div>

</div>

<nav>

<button onclick="openScreen('dashboard')">🏠</button>
<button onclick="openScreen('drive')">🚛</button>
<button onclick="openScreen('fuel')">⛽</button>
<button onclick="openScreen('service')">🔧</button>
<button onclick="openScreen('stats')">📊</button>

</nav>

<script>

let drives=JSON.parse(localStorage.getItem("drives")||"[]")
let fuel=JSON.parse(localStorage.getItem("fuel")||"[]")
let service=JSON.parse(localStorage.getItem("service")||"[]")
let tires=JSON.parse(localStorage.getItem("tires")||"[]")

function openScreen(id){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

render()

}

function saveDrive(){

let d={

load:loadPlace.value,
unload:unloadPlace.value,
weight:weight.value,
washStart:washStart.value,
washEnd:washEnd.value

}

drives.push(d)

localStorage.setItem("drives",JSON.stringify(drives))

alert("Jízda uložena")

render()

}

function saveFuel(){

let f={

km:parseFloat(fuelKm.value),
liters:parseFloat(fuelLiters.value)

}

fuel.push(f)

localStorage.setItem("fuel",JSON.stringify(fuel))

alert("Tankování uloženo")

render()

}

function saveService(){

service.push({

text:serviceText.value,
km:serviceKm.value

})

localStorage.setItem("service",JSON.stringify(service))

alert("Servis uložen")

}

function saveTire(){

tires.push({

pos:tirePos.value,
km:tireKm.value

})

localStorage.setItem("tires",JSON.stringify(tires))

alert("Pneumatika uložena")

}

function render(){

statDrives.innerText=drives.length
statFuel.innerText=fuel.length

let washCount=0

drives.forEach(d=>{
if(d.washStart) washCount++
})

statWash.innerText=washCount

if(fuel.length>1){

let km=fuel[fuel.length-1].km-fuel[0].km

let liters=0

fuel.forEach(f=>liters+=f.liters)

let cons=(liters/km)*100

statCons.innerText=cons.toFixed(1)

drawChart()

}

}

function drawChart(){

let labels=[]
let data=[]

for(let i=1;i<fuel.length;i++){

let km=fuel[i].km-fuel[i-1].km

let cons=(fuel[i].liters/km)*100

labels.push(i)
data.push(cons)

}

new Chart(document.getElementById("fuelChart"),{

type:"line",

data:{

labels:labels,

datasets:[{

label:"Spotřeba l/100km",

data:data

}]

}

})

}

render()

</script>

</body>
</html>
