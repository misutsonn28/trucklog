<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TruckLog PRO V13.4</title>
  <meta name="theme-color" content="#081a33" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TruckLog" />
  <style>
    :root{
      --bg:#060d18;
      --card:rgba(9,18,32,.78);
      --card2:rgba(12,23,40,.92);
      --line:rgba(148,163,184,.15);
      --line2:rgba(125,211,252,.26);
      --txt:#f7fbff;
      --muted:#a9b7d1;
      --muted2:#7f91af;
      --acc:#fb923c;
      --acc2:#38bdf8;
      --warn:#fbbf24;
      --danger:#fb7185;
      --ok:#34d399;
      --shadow:0 26px 70px rgba(2,6,23,.42);
      --radius-xl:30px;
      --radius-lg:22px;
      --radius-md:18px;
      --input:56px;
      --max:1180px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;color:var(--txt);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 8% 6%, rgba(56,189,248,.16), transparent 24%),
        radial-gradient(circle at 92% 0%, rgba(251,146,60,.14), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(96,165,250,.12), transparent 28%),
        linear-gradient(180deg, #030712 0%, #07101d 38%, #091321 100%);
      overflow:hidden;display:flex;flex-direction:column;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer;border:0}
    input,select,textarea{
      width:100%;min-height:var(--input);border-radius:20px;padding:14px 16px;
      color:var(--txt);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        rgba(7,16,29,.86);
      border:1px solid rgba(148,163,184,.13);
      outline:none;
    }
    textarea{min-height:110px;resize:vertical}
    input:focus,select:focus,textarea:focus{
      border-color:rgba(56,189,248,.42);
      box-shadow:0 0 0 4px rgba(56,189,248,.09), 0 14px 28px rgba(2,6,23,.18);
    }
    .hidden{display:none !important}
    .app{
      max-width:var(--max);margin:0 auto;width:100%;flex:1 1 auto;min-height:0;
      overflow-y:auto;padding:18px 16px 24px;
      -webkit-overflow-scrolling:touch;
    }
    .hero,.section,.card,.summary,.history-card,.metric,.icon-stat,.block,.vehicle-card,.profile-card,.trip-row{
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)),
        var(--card2);
      border:1px solid rgba(148,163,184,.12);
      border-radius:24px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px) saturate(135%);
      -webkit-backdrop-filter:blur(18px) saturate(135%);
    }
    .hero,.section{padding:22px;margin-bottom:18px}
    .hero{position:relative;overflow:hidden;border-radius:34px}
    .hero-version{
      position:absolute;top:14px;right:14px;z-index:3;
      padding:8px 12px;border-radius:999px;background:rgba(7,14,26,.78);
      border:1px solid rgba(255,255,255,.1);font-weight:900;letter-spacing:.05em
    }
    .hero-main{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px}
    .hero-logo-panel{
      width:min(100%,560px);padding:16px;border-radius:30px;
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.08);
    }
    .hero-logo-image{width:100%;max-width:420px;display:block;margin:0 auto}
    .hero-accent-line{
      width:min(220px,55%);height:5px;border-radius:999px;
      background:linear-gradient(90deg,#38bdf8,#60a5fa,#fb923c);
    }
    .title{font-size:clamp(1.3rem,2vw,1.8rem);font-weight:800;letter-spacing:-.04em}
    .desc,.hint,.history-sub,.hero-tagline{color:var(--muted)}
    h1,h2,h3,h4,p{margin:0}
    .section-head,.actions,.history-top{display:flex;gap:16px;justify-content:space-between;align-items:flex-start;flex-wrap:wrap}
    .grid{display:grid;gap:14px}
    .split{display:grid;gap:16px;grid-template-columns:repeat(2,minmax(0,1fr))}
    .triple{display:grid;gap:14px;grid-template-columns:repeat(3,minmax(0,1fr))}
    .field{display:flex;flex-direction:column;gap:8px}
    .field label{font-size:.95rem;font-weight:700}
    .btn,.btn2,.btn-danger,.btn-ok,.chip{
      min-height:52px;padding:0 16px;border-radius:18px;font-weight:800;
      transition:.18s transform,.18s background,.18s border-color,.18s box-shadow;
    }
    .btn{background:linear-gradient(135deg,#38bdf8,#fb923c);color:#05121f}
    .btn2,.chip{
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        rgba(7,16,29,.9);
      border:1px solid rgba(148,163,184,.12);color:var(--txt)
    }
    .btn-ok{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.22);color:#b7f7dd}
    .btn-danger{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);color:#ffd1da}
    .btn:hover,.btn2:hover,.btn-danger:hover,.btn-ok:hover,.chip:hover{transform:translateY(-1px)}
    .tabs,.profile-switcher{
      display:inline-flex;gap:6px;padding:7px;border-radius:20px;flex-wrap:wrap;
      background:rgba(5,12,24,.72);border:1px solid rgba(148,163,184,.1);
    }
    .tabs button,.profile-switcher button{
      background:transparent;color:#9db0cd;border-radius:15px;padding:10px 14px;min-height:42px;font-weight:800
    }
    .tabs button.active,.profile-switcher button.active{
      background:linear-gradient(135deg,#38bdf8,#fb923c);color:#04111f;
    }
    .summary{padding:16px}
    .summary strong{display:block}
    .summary span{display:block;margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .icon-stats{
      display:grid;gap:12px;grid-template-columns:repeat(2,minmax(110px,1fr));
      width:100%;max-width:360px;margin:14px auto 0;
    }
    .icon-stat{
      display:flex;align-items:center;justify-content:center;gap:14px;min-height:84px;padding:16px
    }
    .icon-bubble{
      width:48px;height:48px;border-radius:16px;display:grid;place-items:center;font-size:22px;flex:0 0 auto;
      background:linear-gradient(135deg, rgba(56,189,248,.2), rgba(251,146,60,.12));
      border:1px solid rgba(125,211,252,.18);
    }
    .icon-stat .value{font-size:1.7rem;font-weight:900}
    .stats-grid,.profile-stats-grid,.chart-kpi-row,.metrics{display:grid;gap:12px;grid-template-columns:repeat(3,minmax(0,1fr))}
    .profile-stats-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .card,.metric,.icon-stat,.block,.vehicle-card,.profile-card,.trip-row{padding:16px}
    .metric .l,.tiny{font-size:.74rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted2);font-weight:700}
    .metric .v,.big{margin-top:6px;font-weight:900}
    .big{font-size:1.55rem}
    .toggle-line{
      display:flex;align-items:center;gap:12px;min-height:56px;padding:12px 14px;border-radius:18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        rgba(8,17,30,.86);
      border:1px solid rgba(148,163,184,.12);
    }
    .trip-switch{
      display:flex;align-items:center;justify-content:space-between;gap:14px;min-height:58px;padding:12px 14px;
      border-radius:20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        rgba(7,16,29,.9);
      border:1px solid rgba(148,163,184,.13);
    }
    .trip-switch-title{font-size:.84rem;font-weight:800;line-height:1.2;min-width:0}
    .trip-switch-control{position:relative;width:62px;height:36px;flex:0 0 auto}
    .trip-switch-control input{
      position:absolute;inset:0;width:100%;height:100%;margin:0;opacity:0;cursor:pointer;z-index:3
    }
    .trip-switch-slider{
      position:absolute;inset:0;border-radius:999px;background:rgba(56,189,248,.16);
      border:1px solid rgba(56,189,248,.18);transition:.22s background,.22s border-color,.22s box-shadow
    }
    .trip-switch-slider::before{
      content:"";position:absolute;top:3px;left:3px;width:28px;height:28px;border-radius:50%;
      background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.24);transition:.22s transform
    }
    .trip-switch-control input:checked + .trip-switch-slider{
      background:linear-gradient(135deg,#38bdf8,#fb923c);border-color:rgba(255,255,255,.12);box-shadow:0 0 0 4px rgba(56,189,248,.12)
    }
    .trip-switch-control input:checked + .trip-switch-slider::before{transform:translateX(26px)}
    .trip-quick-panel{margin:14px 0 18px;padding:14px;border-radius:22px;background:rgba(8,18,34,.72);border:1px solid var(--line)}
    .trip-quick-actions{display:flex;gap:10px;flex-wrap:wrap}
    .trip-quick-btn{
      min-height:44px;padding:0 14px;border-radius:16px;background:rgba(255,255,255,.05);color:var(--txt);
      border:1px solid var(--line);font-weight:800
    }
    .trip-quick-hint,.trip-trailer-help{margin-top:6px;color:var(--muted);font-size:.84rem;line-height:1.45}
    .active-trip-panel{margin:0 0 16px;padding:16px;border-radius:22px;background:linear-gradient(180deg, rgba(12,28,52,.96), rgba(8,18,34,.92));border:1px solid rgba(249,115,22,.18)}
    .active-trip-panel.is-live{border-color:rgba(249,115,22,.32)}
    .active-trip-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .active-trip-title{font-size:1rem;font-weight:900}
    .active-trip-sub{margin-top:6px;color:var(--muted);font-size:.9rem}
    .active-trip-badge{
      display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;
      border:1px solid rgba(249,115,22,.26);background:rgba(249,115,22,.12);color:#fdba74;font-size:.76rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase
    }
    .active-trip-dot{width:10px;height:10px;border-radius:50%;background:#fb923c;box-shadow:0 0 0 5px rgba(249,115,22,.18)}
    .active-trip-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:14px}
    .active-trip-box{padding:12px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
    .active-trip-box .l{font-size:.72rem;text-transform:uppercase;letter-spacing:.11em;color:var(--muted2);font-weight:700}
    .active-trip-box .v{margin-top:6px;font-size:1rem;font-weight:800;word-break:break-word}
    .active-trip-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .active-trip-empty{color:var(--muted);font-size:.92rem;line-height:1.55}
    .history-actions{display:grid;gap:10px;grid-template-columns:repeat(3,minmax(0,1fr));margin-top:14px}
    .badge{
      display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;border:1px solid transparent
    }
    .badge-ok{background:rgba(52,211,153,.12);color:#b9f7df;border-color:rgba(52,211,153,.18)}
    .badge-warn{background:rgba(251,191,36,.12);color:#ffe29d;border-color:rgba(251,191,36,.18)}
    .badge-danger{background:rgba(251,113,133,.12);color:#ffd5dd;border-color:rgba(251,113,133,.2)}
    .badge-info{background:rgba(56,189,248,.12);color:#bcecff;border-color:rgba(56,189,248,.18)}
    .badge-off{background:rgba(244,63,94,.12);color:#fecdd3;border-color:rgba(244,63,94,.22)}
    .profile-list-grid,.vehicle-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
    .profile-card-head,.vehicle-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .profile-card-main,.vehicle-card-main{min-width:0;display:grid;gap:8px}
    .profile-card-title,.vehicle-card-title{font-size:1rem;font-weight:900;line-height:1.2}
    .profile-card-meta,.vehicle-card-meta,.history-sub{font-size:.9rem;line-height:1.45;color:var(--muted)}
    .profile-card-note,.vehicle-card-note{
      margin-top:10px;padding-top:10px;border-top:1px solid var(--line);color:var(--muted);font-size:.88rem;line-height:1.4
    }
    .profile-card-actions,.vehicle-card-actions{display:grid;gap:8px;grid-template-columns:repeat(3,minmax(0,1fr));margin-top:12px}
    .vehicle-compact-badges{display:flex;gap:8px;flex-wrap:wrap}
    .vehicle-card.trailer-on{border-color:rgba(34,197,94,.32);box-shadow:0 12px 28px rgba(0,0,0,.14),0 0 0 1px rgba(34,197,94,.08) inset,0 0 22px rgba(34,197,94,.10)}
    .vehicle-card.trailer-off{border-color:rgba(244,63,94,.26);box-shadow:0 12px 28px rgba(0,0,0,.14),0 0 0 1px rgba(244,63,94,.08) inset,0 0 22px rgba(244,63,94,.10)}
    .vehicle-connection-wrap{grid-column:1 / -1}
    .vehicle-connection-switch{min-height:58px;border-radius:20px}
    .vehicle-connection-main{display:block;font-size:.88rem;font-weight:900;color:var(--txt)}
    .vehicle-connection-sub{display:block;margin-top:4px;font-size:.76rem;font-weight:700;color:var(--muted)}
    .vehicle-connection-switch .trip-switch-slider{
      background:linear-gradient(135deg, rgba(244,63,94,.34), rgba(190,24,93,.34));
      border-color:rgba(244,63,94,.28);box-shadow:0 0 0 4px rgba(244,63,94,.08)
    }
    .vehicle-connection-switch .trip-switch-control input:checked + .trip-switch-slider{
      background:linear-gradient(135deg,#22c55e,#16a34a);
      border-color:rgba(134,239,172,.36);box-shadow:0 0 0 4px rgba(34,197,94,.14)
    }
    .vehicle-stack-section{display:grid;gap:12px}
    .vehicle-section-head{
      display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap
    }
    .vehicle-section-head h3{
      margin:0;font-size:1rem;font-weight:900;letter-spacing:-.02em
    }
    .vehicle-section-sub{
      color:var(--muted);font-size:.88rem;line-height:1.45
    }
    .vehicle-focus-card{
      padding:18px;border-radius:26px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
        rgba(10,20,35,.94);
      border:1px solid rgba(56,189,248,.18);
      box-shadow:0 20px 42px rgba(2,6,23,.26), 0 0 0 1px rgba(56,189,248,.06) inset
    }
    .vehicle-focus-title{
      font-size:1.02rem;font-weight:900;letter-spacing:-.02em
    }
    .vehicle-focus-meta{
      margin-top:6px;color:var(--muted);font-size:.9rem;line-height:1.45
    }
    .vehicle-focus-actions{
      display:flex;gap:10px;flex-wrap:wrap;margin-top:14px
    }
    .vehicle-focus-card .trip-switch{
      margin-top:14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)),
        rgba(7,16,29,.94)
    }
    .vehicle-focus-card .vehicle-connection-main{font-size:.94rem}
    .vehicle-focus-card .vehicle-connection-sub{font-size:.8rem}
    .vehicle-card.truck-on{
      border-color:rgba(34,197,94,.28);
      box-shadow:
        0 12px 28px rgba(0,0,0,.14),
        0 0 0 1px rgba(34,197,94,.08) inset,
        0 0 22px rgba(34,197,94,.08);
    }
    .vehicle-card.truck-off{
      border-color:rgba(59,130,246,.18);
    }
    .vehicle-card.stk-warning{
      border-color:rgba(251,191,36,.36);
      box-shadow:
        0 12px 28px rgba(0,0,0,.14),
        0 0 0 1px rgba(251,191,36,.08) inset,
        0 0 22px rgba(251,191,36,.12);
    }
    .vehicle-card.stk-alert{
      border-color:rgba(244,63,94,.36);
      box-shadow:
        0 12px 28px rgba(0,0,0,.14),
        0 0 0 1px rgba(244,63,94,.10) inset,
        0 0 26px rgba(244,63,94,.14);
      animation:stkPulse 1.8s ease-in-out infinite;
    }
    .vehicle-card.stk-expired{
      border-color:rgba(225,29,72,.44);
      box-shadow:
        0 12px 28px rgba(0,0,0,.14),
        0 0 0 1px rgba(225,29,72,.12) inset,
        0 0 30px rgba(225,29,72,.20);
      background:
        linear-gradient(180deg, rgba(127,29,29,.10), rgba(255,255,255,.01)),
        var(--card2);
    }
    .badge-stk-ok{
      background:rgba(52,211,153,.12);
      color:#bbf7d0;
      border-color:rgba(52,211,153,.18);
    }
    .badge-stk-warning{
      background:rgba(251,191,36,.16);
      color:#ffe08a;
      border-color:rgba(251,191,36,.24);
      box-shadow:0 0 0 3px rgba(251,191,36,.08);
    }
    .badge-stk-alert{
      background:rgba(244,63,94,.16);
      color:#ffd1da;
      border-color:rgba(244,63,94,.26);
      box-shadow:0 0 0 4px rgba(244,63,94,.10);
    }
    .badge-stk-expired{
      background:rgba(190,24,93,.22);
      color:#ffe4ea;
      border-color:rgba(244,63,94,.34);
      box-shadow:0 0 0 4px rgba(190,24,93,.14);
    }
    @keyframes stkPulse{
      0%,100%{transform:translateY(0);box-shadow:0 12px 28px rgba(0,0,0,.14),0 0 0 1px rgba(244,63,94,.10) inset,0 0 24px rgba(244,63,94,.12)}
      50%{transform:translateY(-1px);box-shadow:0 12px 30px rgba(0,0,0,.14),0 0 0 1px rgba(244,63,94,.12) inset,0 0 34px rgba(244,63,94,.20)}
    }

    .history-trip-list,.list-gap{display:grid;gap:12px}
    .trip-row{padding:0;overflow:hidden}
    .trip-row-btn{
      width:100%;background:transparent;color:var(--txt);display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px;text-align:left
    }
    .trip-row-main{display:grid;gap:6px;min-width:0;flex:1}
    .trip-row-time{font-size:.94rem;font-weight:900}
    .trip-row-route{font-size:1rem;font-weight:800;line-height:1.3}
    .trip-row-meta{font-size:.88rem;color:var(--muted)}
    .trip-row-side{display:flex;align-items:center;gap:12px}
    .trip-row-km{padding:8px 12px;border-radius:16px;background:rgba(7,16,29,.86);border:1px solid rgba(148,163,184,.1);font-size:.86rem;font-weight:900}
    .trip-row-arrow{font-size:1.1rem;color:var(--muted);transition:transform .18s}
    .trip-row.open .trip-row-arrow{transform:rotate(180deg)}
    .trip-row-detail{display:none;padding:0 14px 14px;border-top:1px solid rgba(148,163,184,.08);background:rgba(6,14,25,.36)}
    .trip-row.open .trip-row-detail{display:block}

    .history-calendar-card{background:rgba(12,23,40,.88);border:1px solid rgba(148,163,184,.12);border-radius:28px;padding:16px;box-shadow:var(--shadow)}
    .history-calendar-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .history-calendar-nav{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .history-calendar-month{font-size:1.45rem;font-weight:900;letter-spacing:-.04em}
    .history-calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;margin-top:16px}
    .history-calendar-weekday{text-align:center;color:var(--muted2);font-size:.82rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:6px 0}
    .history-calendar-day{position:relative;min-height:88px;border-radius:20px;border:1px solid rgba(148,163,184,.1);background:rgba(7,16,29,.9);color:var(--txt);padding:12px 10px 10px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:10px;transition:.18s transform,.18s border-color,.18s background}
    .history-calendar-day:hover{transform:translateY(-1px);border-color:rgba(125,211,252,.26)}
    .history-calendar-day.outside{opacity:.42;background:rgba(8,18,34,.52)}
    .history-calendar-day.selected{border-color:rgba(56,189,248,.36);box-shadow:0 0 0 3px rgba(56,189,248,.08),0 16px 30px rgba(2,6,23,.2);background:linear-gradient(180deg, rgba(56,189,248,.06), rgba(251,146,60,.03)), rgba(10,21,36,.95)}
    .history-calendar-day.today .history-calendar-date{color:#fff;text-shadow:0 0 14px rgba(56,189,248,.18)}
    .history-calendar-date{font-size:1.08rem;font-weight:900;line-height:1}
    .history-calendar-marker-wrap{margin-top:auto;width:100%;display:grid;gap:6px;min-height:28px;align-items:end;justify-items:center}
    .history-calendar-marker-row{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;min-height:8px}
    .history-calendar-marker{height:8px;border-radius:999px;background:var(--acc2);box-shadow:0 0 14px rgba(37,99,235,.28)}
    .history-calendar-marker.fuel{background:var(--acc);box-shadow:0 0 14px rgba(249,115,22,.25)}
    .history-calendar-marker.count-1{width:28px}
    .history-calendar-marker.count-2{width:42px}
    .history-calendar-marker.count-3{width:58px}
    .history-calendar-counts{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;min-height:14px}
    .history-calendar-count-badge{padding:2px 6px;border-radius:999px;border:1px solid rgba(148,163,184,.1);background:rgba(7,16,29,.86);color:var(--muted);font-size:.66rem;font-weight:900;line-height:1}
    .history-calendar-count-badge.fuel{color:#ffd4b0;border-color:rgba(249,115,22,.25)}
    .history-calendar-count-badge.trip{color:#bfdbfe;border-color:rgba(37,99,235,.25)}
    .history-calendar-legend{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px;color:var(--muted);font-size:.9rem;font-weight:700}
    .history-calendar-legend-line{width:28px;height:8px;border-radius:999px;background:var(--acc2);display:inline-block}
    .history-calendar-legend-line.fuel{background:var(--acc)}
    .history-selected-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .history-selected-sub{margin-top:6px;color:var(--muted);font-size:.94rem;line-height:1.45}
    .history-selected-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .history-selected-chip{padding:8px 12px;border-radius:999px;background:rgba(7,16,29,.86);border:1px solid rgba(148,163,184,.1);color:var(--txt);font-size:.82rem;font-weight:800}
    .trip-detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:14px}
    .trip-detail-box{padding:12px;border-radius:18px;background:rgba(7,16,29,.88);border:1px solid rgba(148,163,184,.1)}
    .trip-detail-box .l{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted2);font-weight:700}
    .trip-detail-box .v{margin-top:6px;font-size:1rem;font-weight:800;line-height:1.35;word-break:break-word}
    .empty{
      padding:28px;border-radius:24px;border:1px dashed rgba(148,163,184,.18);background:rgba(5,12,24,.5);
      text-align:center;color:var(--muted)
    }
    .nav{
      position:relative;z-index:30;background:rgba(4,10,20,.72);border-top:1px solid rgba(148,163,184,.1);
      backdrop-filter:blur(18px) saturate(150%);box-shadow:0 -16px 40px rgba(2,6,23,.3)
    }
    .nav-in{
      max-width:var(--max);margin:0 auto;padding:10px 12px 2px;display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px
    }
    .nav button{
      min-height:60px;border-radius:22px;background:transparent;color:#90a4c3;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 6px
    }
    .nav button.active{
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015)),
        rgba(12,24,42,.96);
      border:1px solid rgba(148,163,184,.12);color:#fff
    }
    .nav .i{font-size:1.06rem}
    .nav .t{font-size:.74rem;font-weight:800;text-align:center;line-height:1.05}
    @media (max-width:900px){
      .split,.triple,.stats-grid,.profile-stats-grid,.chart-kpi-row,.metrics,.trip-detail-grid,.active-trip-grid{grid-template-columns:1fr}
      .nav-in{grid-template-columns:repeat(3,minmax(0,1fr))}
    }
    @media (max-width:740px){
      .hero,.section{padding:16px}
      .history-actions,.profile-card-actions,.vehicle-card-actions{grid-template-columns:1fr}
      .trip-row-btn{align-items:flex-start}
      .trip-row-side{flex-direction:column;align-items:flex-end;gap:8px}
      .history-calendar-day{min-height:72px;padding:10px 8px 8px;border-radius:16px}
      .history-calendar-month{font-size:1.25rem}
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="screen-overview" class="screen">
      <header class="hero">
        <div class="hero-version">V13.4</div>
        <div class="hero-main">
          <div class="hero-logo-panel">
            <img class="hero-logo-image" src="brand-logo.png" alt="TruckLog logo" />
          </div>
          <div class="hero-accent-line"></div>
          <h1>TruckLog</h1>
          <p class="hero-tagline">digitální deník řidiče pro nákladní dopravu</p>
        </div>
        <div class="icon-stats">
          <div class="icon-stat"><div class="icon-bubble">📝</div><div class="value" id="miniTrips">0</div></div>
          <div class="icon-stat"><div class="icon-bubble">⛽</div><div class="value" id="miniFuel">0</div></div>
        </div>
      </header>

      <section class="section">
        <div class="section-head">
          <div><h2 class="title">Profil</h2></div>
          <div class="profile-switcher" id="profileSwitcher"></div>
        </div>
        <div id="overviewStats"></div>
        <div id="overviewPilotStats" class="mt-16"></div>
        <div id="overviewActiveTrip" class="mt-16"></div>
      </section>
    </section>

    <section id="screen-trip" class="screen hidden">
      <form id="tripForm">
        <section class="section">
          <div class="section-head"><div><h2 class="title" id="tripFormTitle">Nová jízda</h2></div></div>

          <div id="tripLivePanel"></div>

          <div class="trip-quick-panel">
            <div class="trip-quick-actions">
              <button class="trip-quick-btn" type="button" id="tripRepeatLastBtn">Zopakovat poslední</button>
              <button class="trip-quick-btn" type="button" id="tripReverseRouteBtn">Otočit trasu</button>
              <button class="trip-quick-btn" type="button" id="tripPrefillRouteBtn">Doplnit podle trasy</button>
            </div>
            <div id="tripQuickHint" class="trip-quick-hint"></div>
          </div>

          <div class="split">
            <div class="block">
              <h3>Jízda</h3>
              <div class="grid">
                <div class="field">
                  <label for="tripDate">Datum</label>
                  <input id="tripDate" type="date" />
                </div>

                <div class="triple">
                  <div class="field">
                    <label for="tripDepartureTime">Čas odjezdu</label>
                    <input id="tripDepartureTime" type="time" />
                  </div>
                  <div class="field">
                    <label for="tripArrivalTime">Čas příjezdu</label>
                    <input id="tripArrivalTime" type="time" />
                  </div>
                  <div class="field">
                    <label for="tripEmptyDrive">Typ jízdy</label>
                    <label class="trip-switch" for="tripEmptyDrive">
                      <span class="trip-switch-title">Jízda po prázdnu</span>
                      <span class="trip-switch-control">
                        <input id="tripEmptyDrive" type="checkbox" />
                        <span class="trip-switch-slider"></span>
                      </span>
                    </label>
                  </div>
                </div>

                <div class="triple">
                  <div class="field">
                    <label for="tripKmStart">Km start</label>
                    <input id="tripKmStart" inputmode="numeric" />
                  </div>
                  <div class="field">
                    <label for="tripKmEnd">Km konec</label>
                    <input id="tripKmEnd" inputmode="numeric" />
                  </div>
                  <div class="field">
                    <label for="tripDistancePreview">Ujeto km</label>
                    <input id="tripDistancePreview" disabled placeholder="Počítá se automaticky" />
                  </div>
                </div>

                <div class="field">
                  <label for="tripFromPlace">Odkud firma / místo</label>
                  <input id="tripFromPlace" list="placesList" placeholder="Začni psát název místa..." autocomplete="off" />
                </div>

                <div class="field">
                  <label for="tripFromAddress">Odkud adresa</label>
                  <input id="tripFromAddress" placeholder="Adresa místa odkud" />
                </div>

                <div class="field">
                  <label for="tripToPlace">Kam firma / místo</label>
                  <input id="tripToPlace" list="placesList" placeholder="Začni psát název místa..." autocomplete="off" />
                </div>

                <div class="field">
                  <label for="tripToAddress">Kam adresa</label>
                  <input id="tripToAddress" placeholder="Adresa místa kam" />
                </div>

                <div class="field">
                  <label for="tripTrailerSelect">Přípojné vozidlo</label>
                  <select id="tripTrailerSelect"></select>
                  <small id="tripTrailerHelp" class="trip-trailer-help"></small>
                </div>

                <datalist id="placesList"></datalist>
              </div>
            </div>

            <div class="block">
              <h3>Náklad</h3>
              <div class="grid">
                <div class="field" id="tripCommodityField">
                  <label for="tripCommodityPreset">Komodita</label>
                  <select id="tripCommodityPreset" aria-label="Komodita">
                    <option value="">Vyber komoditu</option>
                    <option>Cement</option>
                    <option>Popílek</option>
                    <option>Granulát</option>
                    <option>Vápno</option>
                    <option>Moučka</option>
                    <option>Sádra</option>
                    <option>Písek</option>
                    <option>Kamenivo</option>
                    <option>Jiná</option>
                  </select>
                </div>

                <div class="field hidden" id="tripCommodityCustomWrap">
                  <label for="tripCommodityCustom">Jiná komodita</label>
                  <input id="tripCommodityCustom" aria-label="Jiná komodita" placeholder="Jiná komodita" />
                </div>

                <div class="field" id="tripQuantityField">
                  <label for="tripQuantityKg">Naložené množství (kg)</label>
                  <input id="tripQuantityKg" inputmode="numeric" placeholder="Např. 25450" />
                </div>

                <div class="field hidden" id="tripContainerWrap">
                  <label for="tripContainerNumber">Číslo kontejneru</label>
                  <input id="tripContainerNumber" placeholder="Např. TGHU 482915-3" />
                  <small id="tripContainerInfo"></small>
                </div>

                <div class="field">
                  <label for="tripNote">Poznámka</label>
                  <textarea id="tripNote" placeholder="Např. delší čekání, objížďka, zvláštní poznámka"></textarea>
                </div>
              </div>
            </div>
          </div>
        </section>

        <div class="actions">
          <button class="btn" type="submit" id="tripSubmitBtn">Uložit jízdu</button>
          <button class="btn2" type="button" onclick="resetTripForm()">Vyčistit formulář</button>
        </div>
      </form>
    </section>

    <section id="screen-fuel" class="screen hidden">
      <form id="fuelForm">
        <section class="section">
          <div class="section-head"><div><h2 class="title" id="fuelFormTitle">Tankování / nabíjení</h2></div></div>
          <div class="split">
            <div class="block">
              <div class="grid">
                <div class="field">
                  <label for="fuelType">Typ</label>
                  <select id="fuelType">
                    <option value="Nafta">Nafta</option>
                    <option value="AdBlue">AdBlue</option>
                    <option value="CNG">CNG</option>
                    <option value="LNG">LNG</option>
                    <option value="Nabíjení">Nabíjení</option>
                  </select>
                </div>
                <div class="field">
                  <label for="fuelDate">Datum</label>
                  <input id="fuelDate" type="date" />
                </div>
                <div class="field">
                  <label for="fuelAmount">Množství (litry/kWh)</label>
                  <input id="fuelAmount" type="number" step="0.01" placeholder="0.00" />
                </div>
                <div class="field">
                  <label for="fuelPrice">Celková cena</label>
                  <input id="fuelPrice" type="number" step="0.01" placeholder="0.00" />
                </div>
                <div class="field">
                  <label for="fuelLocation">Čerpací stanice / Místo</label>
                  <input id="fuelLocation" placeholder="Např. Shell, Olomouc" />
                </div>
              </div>
            </div>
          </div>
        </section>
        <div class="actions">
          <button class="btn" type="submit">Uložit záznam</button>
        </div>
      </form>
    </section>

    <section id="screen-history" class="screen hidden">
      <section class="section">
        <h2 class="title">Historie jízd</h2>
        <div class="history-calendar-card mt-16">
          <div class="empty">Kalendář jízd se připravuje...</div>
        </div>
        <div class="history-trip-list mt-16" id="historyList">
          <div class="empty">Zatím žádné uložené jízdy.</div>
        </div>
      </section>
    </section>
  </div>

  <nav class="nav">
    <div class="nav-in">
      <button onclick="showScreen('screen-overview')" class="nav-btn active" data-screen="screen-overview">
        <span class="i">🏠</span><span class="t">Domů</span>
      </button>
      <button onclick="showScreen('screen-trip')" class="nav-btn" data-screen="screen-trip">
        <span class="i">🚛</span><span class="t">Jízda</span>
      </button>
      <button onclick="showScreen('screen-fuel')" class="nav-btn" data-screen="screen-fuel">
        <span class="i">⛽</span><span class="t">Palivo</span>
      </button>
      <button onclick="showScreen('screen-history')" class="nav-btn" data-screen="screen-history">
        <span class="i">📅</span><span class="t">Historie</span>
      </button>
    </div>
  </nav>

  <script>
    // Funkce pro přepínání obrazovek z navigace
    function showScreen(screenId) {
      // Skryje všechny existující obrazovky (přidá class="hidden")
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      
      // Zobrazí pouze tu obrazovku, kterou chceme
      document.getElementById(screenId).classList.remove('hidden');

      // Zvýrazní aktivní tlačítko ve spodní navigaci
      document.querySelectorAll('.nav-btn').forEach(btn => {
        if (btn.dataset.screen === screenId) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    // Vyčištění formuláře pro jízdu
    function resetTripForm() {
      document.getElementById('tripForm').reset();
    }
  </script>
</body>
</html>
