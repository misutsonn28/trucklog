
<!DOCTYPE html>
<html lang="cs">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TruckLog PRO</title>

<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
margin:0;
background:#f2f2f7;
padding-bottom:90px;
}

header{
background:#007aff;
color:white;
padding:16px;
font-size:22px;
text-align:center;
font-weight:600;
}

.screen{
display:none;
padding:15px;
}

.active{
display:block;
}

.card{
background:white;
border-radius:14px;
padding:16px;
margin-bottom:14px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.stat{
font-size:28px;
font-weight:600;
}

input,select{
width:100%;
padding:12px;
margin:6px 0;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
margin-top:8px;
background:#007aff;
border:none;
border-radius:10px;
color:white;
font-size:16px;
font-weight:600;
}

.bigButton{
background:#28a745;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border-bottom:1px solid #eee;
padding:8px;
text-align:center;
}

nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #ccc;
display:flex;
}

nav button{
flex:1;
border:none;
background:none;
padding:10px;
font-size:14px;
}

</style>

</head>

<body>

<header>🚛 TruckLog PRO</header>

<!-- DASHBOARD -->

<div id="dashboard" class="screen active">

<div class="card">

<h3>Souprava</h3>

<p id="truckInfo">nenastaveno</p>

</div>

<div class="card">

<h3>Průměrná spotřeba</h3>

<div class="stat" id="fuelConsumption">0</div>

</div>

<div class="card">

<button class="bigButton" onclick="show('drive')">

➕ Nová jízda

</button>

</div>

</div>

<!-- JÍZDY -->

<div id="drive" class="screen">

<div class="card">

<h3>Nová jízda</h3>

<input type="date" id="d_date">

<input type="text" id="d_from" placeholder="Nakládka">

<input type="text" id="d_to" placeholder="Vykládka">

<select id="d_material">

<option>cement</option>
<option>popílek</option>
<option>vápno</option>
<option>granulát</option>

</select>

<input type="number" id="d_weight" placeholder="Váha (t)">

<input type="number" id="d_km" placeholder="Ujeté km">

<h4>Vykládka</h4>

<input type="time" id="unload_start">

<input type="time" id="unload_end">

<input type="number" id="compressor_pressure"
placeholder="Tlak kompresoru"
min="1" max="3" step="0.1">

<h4>Myčka</h4>

<label>

<input type="checkbox" id="wash_done">

Myčka cisterny

</label>

<input type="time" id="wash_start">

<input type="time" id="wash_end">

<button onclick="addDrive()">

Uložit jízdu

</button>

</div>

<div class="card">

<h3>Historie jízd</h3>

<table>

<thead>

<tr>

<th>Datum</th>
<th>Trasa</th>
<th>t</th>
<th>km</th>

</tr>

</thead>

<tbody id="driveTable"></tbody>

</table>

</div>

</div>

<!-- TANKOVÁNÍ -->

<div id="fuel" class="screen">

<div class="card">

<h3>Tankování</h3>

<input type="date" id="f_date">

<input type="number" id="f_km" placeholder="km">

<input type="number" id="f_liters" placeholder="litry">

<button onclick="addFuel()">

Uložit

</button>

</div>

<table>

<thead>

<tr>

<th>Datum</th>
<th>km</th>
<th>litry</th>

</tr>

</thead>

<tbody id="fuelTable"></tbody>

</table>

</div>

<!-- STATISTIKY -->

<div id="stats" class="screen">

<div class="card">

<h3>Graf spotřeby</h3>

<canvas id="fuelChart"></canvas>

</div>

</div>

<!-- NASTAVENÍ -->

<div id="settings" class="screen">

<div class="card">

<h3>Nastavení soupravy</h3>

<input type="text" id="driver" placeholder="Řidič">

<input type="text" id="truckBrand" placeholder="Značka tahače">

<input type="text" id="truckPlate" placeholder="SPZ tahače">

<input type="text" id="trailerBrand" placeholder="Značka cisterny">

<input type="text" id="trailerPlate" placeholder="SPZ cisterny">

<button onclick="saveSetup()">

Uložit

</button>

</div>

<div class="card">

<button onclick="exportCSV()">

Export do Excelu

</button>

<button onclick="backupData()">

Záloha dat

</button>

</div>

</div>

<!-- MENU -->

<nav>

<button onclick="show('dashboard')">🏠</button>

<button onclick="show('drive')">🚚</button>

<button onclick="show('fuel')">⛽</button>

<button onclick="show('stats')">📊</button>

<button onclick="show('settings')">⚙️</button>

</nav>

<script>

let drives=JSON.parse(localStorage.getItem("drives"))||[]
let fuel=JSON.parse(localStorage.getItem("fuel"))||[]
let setup=JSON.parse(localStorage.getItem("setup"))||{}

function save(){

localStorage.setItem("drives",JSON.stringify(drives))
localStorage.setItem("fuel",JSON.stringify(fuel))
localStorage.setItem("setup",JSON.stringify(setup))

}

function show(id){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function saveSetup(){

setup={

driver:driver.value,
truck:truckBrand.value,
plate:truckPlate.value,
trailer:trailerBrand.value,
trailerPlate:trailerPlate.value

}

save()

truckInfo.innerText=

setup.driver+" | "+setup.truck+" "+setup.plate+
" + "+setup.trailer+" "+setup.trailerPlate

}

function addDrive(){

drives.push({

date:d_date.value,
from:d_from.value,
to:d_to.value,
weight:d_weight.value,
km:d_km.value

})

save()

render()

}

function addFuel(){

fuel.push({

date:f_date.value,
km:f_km.value,
liters:f_liters.value

})

save()

render()

}

function render(){

driveTable.innerHTML=""

drives.forEach(d=>{

driveTable.innerHTML+=`

<tr>

<td>${d.date}</td>

<td>${d.from}-${d.to}</td>

<td>${d.weight}</td>

<td>${d.km}</td>

</tr>

`

})

fuelTable.innerHTML=""

fuel.forEach(f=>{

fuelTable.innerHTML+=`

<tr>

<td>${f.date}</td>

<td>${f.km}</td>

<td>${f.liters}</td>

</tr>

`

})

calculateConsumption()

drawFuelChart()

}

function calculateConsumption(){

if(fuel.length<2)return

let liters=0
let km=0

for(let i=1;i<fuel.length;i++){

liters+=parseFloat(fuel[i].liters)
km+=fuel[i].km-fuel[i-1].km

}

let cons=(liters/km)*100

fuelConsumption.innerText=cons.toFixed(1)+" l/100km"

}

function drawFuelChart(){

if(fuel.length<2)return

let labels=[]
let data=[]

for(let i=1;i<fuel.length;i++){

let km=fuel[i].km-fuel[i-1].km
let cons=(fuel[i].liters/km)*100

labels.push("Tank "+i)
data.push(cons)

}

new Chart(document.getElementById("fuelChart"),{

type:"line",

data:{

labels:labels,

datasets:[{

label:"Spotřeba",

data:data

}]

}

})

}

function exportCSV(){

let csv="datum,nakladka,vykladka,vaha,km\n"

drives.forEach(d=>{

csv+=d.date+","+d.from+","+d.to+","+d.weight+","+d.km+"\n"

})

let blob=new Blob([csv])

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url
a.download="trucklog.csv"
a.click()

}

function backupData(){

let data={drives,fuel,setup}

let blob=new Blob([JSON.stringify(data)])

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url
a.download="trucklog_backup.json"
a.click()

}

render()

</script>

</body>
</html>
